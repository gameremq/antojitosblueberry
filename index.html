<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>Antojitos Blueberry</title>
<style>
:root{--bg1:#fff;--bg2:#f5f5f5;--bg3:#eee;--tx1:#1a1a1a;--tx2:#666;--tx3:#999;--bd1:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.2)}
@media(prefers-color-scheme:dark){:root{--bg1:#1e1e1e;--bg2:#2a2a2a;--bg3:#141414;--tx1:#f0f0f0;--tx2:#aaa;--tx3:#777;--bd1:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.2)}}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg3);min-height:100vh}
input,select{width:100%;padding:8px 10px;border:0.5px solid var(--bd2);border-radius:8px;background:var(--bg1);color:var(--tx1);font-size:13px}
input:focus,select:focus{outline:none;border-color:#534AB7}
button{cursor:pointer;font-family:inherit}
.app{max-width:500px;margin:0 auto}
.hdr{background:#534AB7;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-radius:12px 12px 0 0}
.hdr-t{font-size:16px;font-weight:500}.hdr-s{font-size:11px;opacity:.7;margin-top:1px}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:5px 12px;font-size:12px}
.tabs{display:flex;background:var(--bg1);border-bottom:0.5px solid var(--bd1);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 11px;border:none;background:transparent;font-size:11px;color:var(--tx2);border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:#534AB7;border-bottom-color:#534AB7;font-weight:500}
.scr{padding:14px;background:var(--bg2);min-height:calc(100vh - 120px)}
.card{background:var(--bg1);border:0.5px solid var(--bd1);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.mrow{display:flex;gap:8px;margin-bottom:8px}
.met{background:var(--bg2);border-radius:8px;padding:10px 12px;flex:1;min-width:0}
.mlb{font-size:11px;color:var(--tx2);margin-bottom:2px}
.mvl{font-size:17px;font-weight:500;line-height:1.2}
.msb{font-size:10px;color:var(--tx3);margin-top:2px}
.btn{border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;border:1px solid}
.p{background:#534AB7;color:#fff;border-color:#534AB7}
.s{background:#1D9E75;color:#fff;border-color:#1D9E75}
.d{background:#D85A30;color:#fff;border-color:#D85A30}
.op{background:transparent;color:#534AB7;border-color:#534AB7}
.od{background:transparent;color:#D85A30;border-color:#D85A30}
.fw{width:100%;display:block;text-align:center;margin-bottom:8px}
.sm{padding:5px 10px;font-size:12px}
.bdg{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
.bp{background:#EEEDFE;color:#3C3489}.bt{background:#E1F5EE;color:#0F6E56}
.bc{background:#FAECE7;color:#712B13}.ba{background:#FAEEDA;color:#633806}
.br{background:#FCEBEB;color:#A32D2D}.bg{background:#EAF3DE;color:#27500A}
.cat-clasica{background:#EEEDFE;color:#3C3489}
.cat-especial{background:#FAEEDA;color:#633806}
.cat-premium{background:#F5C4B3;color:#712B13}
.est-pedido{background:#FAEEDA;color:#633806;border:1px solid #FAC775}
.est-pendiente{background:#FCEBEB;color:#A32D2D;border:1px solid #F09595}
.est-terminado{background:#EAF3DE;color:#27500A;border:1px solid #C0DD97}
.pago-efectivo{background:#E1F5EE;color:#085041}
.pago-transferencia{background:#E6F1FB;color:#0C447C}
.vcard{background:var(--bg1);border:0.5px solid var(--bd1);border-radius:12px;padding:11px 13px;margin-bottom:7px;cursor:pointer}
.vcard.pedido{border-left:3px solid #BA7517}
.vcard.pendiente{border-left:3px solid #E24B4A}
.vcard.terminado{border-left:3px solid #1D9E75}
.ftab{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.ftab button{padding:5px 11px;font-size:11px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--tx2)}
.ftab button.on{background:#534AB7;color:#fff;border-color:#534AB7;font-weight:500}
.est-btn{padding:8px 10px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid;cursor:pointer;flex:1;text-align:center}
.pago-btn{padding:8px 10px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid;cursor:pointer;flex:1;text-align:center}
.fld{margin-bottom:11px}.flb{font-size:12px;color:var(--tx2);margin-bottom:4px}
.rb{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.li{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--bd1)}
.li:last-child{border-bottom:none}
.lt{font-size:13px;font-weight:500;margin-bottom:2px}
.ls{font-size:11px;color:var(--tx2);line-height:1.5}
.lv{font-size:14px;font-weight:500;text-align:right;flex-shrink:0;margin-left:10px}
.emp{text-align:center;padding:40px 0;color:var(--tx2);font-size:13px}
.inb{background:var(--bg2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--tx2);margin-bottom:12px;line-height:1.6}
.pb{height:4px;background:var(--bd1);border-radius:2px;margin-top:4px;overflow:hidden}
.pf{height:100%;border-radius:2px}
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.52);z-index:10;display:flex;align-items:flex-end}
.sh{background:var(--bg1);border-radius:12px 12px 0 0;padding:16px;width:100%;max-height:90vh;overflow-y:auto}
.shh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sht{font-size:15px;font-weight:500}
.xb{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:none;font-size:18px;line-height:28px;text-align:center;color:var(--tx2)}
.av{width:38px;height:38px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#3C3489;flex-shrink:0}
.sep{height:0.5px;background:var(--bd1);margin:10px 0}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ab{padding:10px;border-radius:8px;border:0.5px solid var(--bd2);background:var(--bg2);color:var(--tx1);font-size:12px;font-weight:500;text-align:center;width:100%}
.bc2{display:flex;align-items:flex-end;gap:4px;height:110px;padding:0 4px}
.bcl{display:flex;flex-direction:column;align-items:center;flex:1}
.br2{width:100%;border-radius:3px 3px 0 0}
.bla{font-size:9px;color:var(--tx3);margin-top:3px;text-align:center;max-width:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blv{font-size:9px;color:var(--tx2);margin-bottom:2px}
.fch{display:inline-block;padding:4px 10px;font-size:12px;border-radius:6px;border:1px solid var(--bd1);margin:3px;cursor:pointer;background:var(--bg2);color:var(--tx2)}
.fch.sel{background:#534AB7;color:#fff;border-color:#534AB7}
/* Comanda item row */
.ci{display:grid;grid-template-columns:1fr 48px 52px 36px;gap:5px;align-items:center;padding:7px;background:var(--bg2);border-radius:8px;margin-bottom:6px}
.ci.sin-stock{border:1px solid #E24B4A}
.ci select{font-size:12px;padding:5px 6px}
.ci input[type=number]{font-size:12px;padding:5px 6px;text-align:center}
.ci .del{background:none;border:none;color:#E24B4A;font-size:20px;padding:0;line-height:1;text-align:center}
.ci-meta{font-size:10px;color:var(--tx3);padding:2px 0 4px;grid-column:1/-1;display:flex;gap:8px}
.cajav{background:#E1F5EE;border:1px solid #5DCAA5;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.cajac{background:var(--bg2);border:0.5px solid var(--bd1);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.ptab{display:flex;border:1px solid var(--bd2);border-radius:8px;overflow:hidden;margin-bottom:12px}
.ptab button{flex:1;padding:7px 4px;font-size:11px;border:none;background:transparent;color:var(--tx2)}
.ptab button.on{background:#534AB7;color:#fff;font-weight:500}
.highlight{background:#E1F5EE;border:1px solid #5DCAA5;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px}
.warn{background:#FAEEDA;border:1px solid #FAC775;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#633806}
.errbx{background:#FCEBEB;border:1px solid #F09595;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#A32D2D}
.rl{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--bd1);font-size:12px}
.rl:last-child{border-bottom:none}
.chk-row{display:flex;align-items:center;gap:10px;padding:7px 0;margin-bottom:4px}
.chk-row input[type=checkbox]{width:auto;flex-shrink:0}
.chk-lbl{font-size:13px;color:var(--tx1);flex:1}
.chk-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.precio-tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;border:1px solid}
.precio-25{background:#FFF3E0;color:#E65100;border-color:#FFB74D}
.precio-50{background:#E8F5E9;color:#1B5E20;border-color:#66BB6A}
/* Prod split row */
.prod-split{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--bg2);border-radius:8px;padding:10px;margin-bottom:8px}
.prod-split-lbl{font-size:11px;color:var(--tx2);margin-bottom:4px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <div><div class="hdr-t">Antojitos Blueberry</div><div class="hdr-s" id="hsub">Panel de gestión</div></div>
    <button class="hdr-btn" onclick="openCfg()">⚙ Configurar</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="scr" id="scr"></div>
  <div id="mr"></div>
</div>
<script>
// ─── CATEGORÍAS ───────────────────────────────────────────────────────────────
// Clásica y Especial pueden vender a $0.25 o $0.50 según producción
// Premium siempre a $0.50
const CATS={
  clasica: {label:'Clásica', precios:[.25,.50], promo:{n:3, p25:.65, p50:1.30}, cls:'cat-clasica'},
  especial:{label:'Especial',precios:[.25,.50], promo:{n:4, p25:.90, p50:1.75}, cls:'cat-especial'},
  premium: {label:'Premium', precios:[.50],     promo:null,                      cls:'cat-premium'}
};
const SAB_CAT={
  'Pay Limón':'especial','Galleta María':'especial','Ronpasa':'especial',
  'Queso':'premium','Cheesecake':'premium'
};
const catDe=s=>CATS[SAB_CAT[s]||'clasica'];
const esPremium=s=>(SAB_CAT[s]||'clasica')==='premium';
const precioPromo=(s,precio)=>{
  const cat=catDe(s);if(!cat.promo)return null;
  return precio===.25?cat.promo.p25:cat.promo.p50;
};

// ─── CONSTANTES ───────────────────────────────────────────────────────────────
const SAB=['Vainilla','Oreo','Maracuyá','Pay Limón','Fresa','Piña','Coco','Cheesecake','Café','Mango','Galleta María','Banano','Queso','Chocolate','Ronpasa'];
const COL=['#534AB7','#1D9E75','#D85A30','#BA7517','#E24B4A','#185FA5','#993556','#3B6D11','#854F0B','#0F6E56','#712B13','#633806','#3C3489','#993C1D','#888780'];
const CEG=['Transporte','Ingredientes','Empaques','Gas/Electricidad','Inversión en stock','Publicidad','Otros gastos'];
const CIN=['Venta adicional','Anticipo cliente','Devolución','Otro ingreso'];
const TABS=[{id:'inicio',l:'Inicio'},{id:'caja',l:'Caja'},{id:'stock',l:'Stock'},{id:'ventas',l:'Ventas'},{id:'finanzas',l:'Finanzas'},{id:'costos',l:'Costos'},{id:'clientes',l:'Clientes'},{id:'reportes',l:'Reportes'}];
const BT=12,MG=30,LML=240,AML=240;
const ESTADOS={pedido:{l:'Pedido',cls:'est-pedido'},pendiente:{l:'Pendiente',cls:'est-pendiente'},terminado:{l:'Terminado',cls:'est-terminado'}};
const PAGOS={efectivo:{l:'Efectivo',cls:'pago-efectivo'},transferencia:{l:'Transferencia',cls:'pago-transferencia'}};

// ─── DATOS ────────────────────────────────────────────────────────────────────
// stock[s] = {d25:0, d50:0, p:0}
// d25 = bolos a $0.25 disponibles, d50 = bolos a $0.50 disponibles
// p = total producidos (histórico)
function defD(){return{
  esp:{mkg:1.50,ll:.80,al:0},
  stock:Object.fromEntries(SAB.map(s=>[s,{d25:0,d50:0,p:0}])),
  ventas:[],trans:[],clientes:[],cierres:[],caja:null,
  costos:Object.fromEntries(SAB.map(s=>[s,{ing:'',qty:.05,unit:'kg',costo:0}]))
};}

let D=defD(),tab='inicio',selCli=null,vFiltro='todos';
let cTab='base',cSab=SAB[0],calSab=SAB[0],calBolos=12;

// Comanda globals (persisten entre re-renders parciales)
// CI item: {s:'Vainilla', q:1, precio:0.50}
let CI=[{s:SAB[0],q:1,precio:.50}];
let CC='',CPago='',CEst='pedido',CFecha='',CUsarLibre=false,CLibre=0;

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const hoy=()=>new Date().toISOString().slice(0,10);
const $=id=>document.getElementById(id);
const f$=v=>'$'+(+v||0).toFixed(2);
const f4=v=>'$'+(+v||0).toFixed(4);
const fd=d=>d?d.slice(5):'-';
const fdl=d=>{if(!d)return'-';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;};
const cajaF=()=>!D.caja?null:(typeof D.caja==='string'?D.caja:D.caja.fecha);
const cajaM=()=>!D.caja?0:(typeof D.caja==='string'?0:(D.caja.monto||0));
const cajaOk=()=>cajaF()===hoy();
const sumV=vs=>vs.reduce((a,v)=>a+v.total,0);
const vdDia=d=>D.ventas.filter(v=>v.fecha===d);
const egDia=d=>D.trans.filter(t=>t.fecha===d&&t.tipo==='eg').reduce((a,t)=>a+t.monto,0);
const inDia=d=>D.trans.filter(t=>t.fecha===d&&t.tipo==='in').reduce((a,t)=>a+t.monto,0);
// Stock total disponible de un sabor (suma d25 + d50)
const stockD=s=>(D.stock[s]?.d25||0)+(D.stock[s]?.d50||0);
// Stock al precio dado
const stockPrecio=(s,precio)=>precio===.25?(D.stock[s]?.d25||0):(D.stock[s]?.d50||0);

// ─── COSTOS ───────────────────────────────────────────────────────────────────
function cEspT(){const e=D.esp;return(MG/1000)*(e.mkg||0)+(LML/1000)*(e.ll||0)+(AML/1000)*(e.al||0);}
function cSabT(s){const c=D.costos[s];return(c.qty||0)*(c.costo||0);}
function cTanda(s){return cEspT()+cSabT(s);}

// ─── TOTAL COMANDA ────────────────────────────────────────────────────────────
// Cada item tiene su precio ya definido
function totAutoItems(items){
  return+(items.reduce((a,it)=>a+(+it.q||0)*(+it.precio||.50),0)).toFixed(2);
}
function totLibre(libre){return+(libre||0).toFixed(2);}
function calcTotal(items,libre,usarLibre){
  return usarLibre?totLibre(libre):totAutoItems(items);
}
function resumenLineas(items){
  // Agrupar por sabor+precio para mostrar resumen claro
  const grupos={};
  items.forEach(it=>{
    const k=`${it.s}|${it.precio}`;
    grupos[k]=(grupos[k]||0)+(+it.q||0);
  });
  return Object.entries(grupos).map(([k,q])=>{
    const[s,pr]=k.split('|');
    const subtotal=+(q*(+pr)).toFixed(2);
    return`${q}× ${s} <span class="precio-tag ${+pr===.25?'precio-25':'precio-50'}">${f$(+pr)}</span> = ${f$(subtotal)}`;
  }).join('<br>');
}

// ─── STOCK OPERACIONES ────────────────────────────────────────────────────────
function deducirStock(v){
  if(v.stockDeducted)return;
  (v.items||[{s:v.sab,q:v.cant,precio:v.precio||.50}]).forEach(it=>{
    const sk=D.stock[it.s];if(!sk)return;
    const pr=+(it.precio||.50);
    const q=+it.q||0;
    if(pr===.25){sk.d25=Math.max(0,sk.d25-q);}
    else{sk.d50=Math.max(0,sk.d50-q);}
  });
  v.stockDeducted=true;
}
function restaurarStock(v){
  if(!v.stockDeducted)return;
  (v.items||[{s:v.sab,q:v.cant,precio:v.precio||.50}]).forEach(it=>{
    const sk=D.stock[it.s];if(!sk)return;
    const pr=+(it.precio||.50);
    if(pr===.25){sk.d25+=(+it.q||0);}
    else{sk.d50+=(+it.q||0);}
  });
  v.stockDeducted=false;
}
function checkStock(items){
  const needed={};
  items.forEach(it=>{
    const k=`${it.s}|${+(it.precio||.50)}`;
    needed[k]=(needed[k]||0)+(+it.q||0);
  });
  return Object.entries(needed).filter(([k,q])=>{
    const[s,pr]=k.split('|');
    return stockPrecio(s,+pr)<q;
  }).map(([k,q])=>{
    const[s,pr]=k.split('|');
    return`${s} a ${f$(+pr)} (necesitas ${q}, tienes ${stockPrecio(s,+pr)})`;
  });
}

// ─── BADGES ───────────────────────────────────────────────────────────────────
function eBadge(e){const x=ESTADOS[e||'pedido'];return`<span class="bdg ${x.cls}">${x.l}</span>`;}
function pBadge(p){if(!p)return'';const x=PAGOS[p];return x?`<span class="bdg ${x.cls}" style="margin-left:4px">${x.l}</span>`:'';}
function catBadge(s){const c=catDe(s);return`<span class="bdg ${c.cls}" style="font-size:10px">${c.label}</span>`;}
function pTagHtml(pr){return`<span class="precio-tag ${+pr===.25?'precio-25':'precio-50'}">${f$(+pr)}</span>`;}

// ─── DESCRIPCIÓN VENTA ────────────────────────────────────────────────────────
function vDesc(v){
  if(v.tipo==='comanda'){
    return(v.items||[]).map(it=>`${it.q}× ${it.s} ${f$(+(it.precio||.50))}`).join(', ');
  }
  const pr=v.precio||.50;
  if(v.tipo==='unitario')return`${v.cant}× ${v.sab} ${f$(pr)}`;
  if(v.tipo==='promo')return`${v.promos} promo · ${v.sab} ${f$(pr)}`;
  return`${v.cant} bolos mayorista · ${v.sab||''}`;
}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function load(){
  try{
    const r=localStorage.getItem('ab_v6');
    if(r){
      const s=JSON.parse(r);
      D={...defD(),...s};
      // Migrar stock antiguo (d→d50 si no tiene d25/d50)
      const stDef=defD().stock;
      SAB.forEach(sab=>{
        if(!D.stock[sab])D.stock[sab]={d25:0,d50:0,p:0};
        if(D.stock[sab].d!==undefined&&D.stock[sab].d50===undefined){
          D.stock[sab].d50=D.stock[sab].d||0;
          D.stock[sab].d25=0;
          delete D.stock[sab].d;
        }
        if(D.stock[sab].d25===undefined)D.stock[sab].d25=0;
        if(D.stock[sab].d50===undefined)D.stock[sab].d50=0;
      });
      D.costos={...defD().costos,...(s.costos||{})};
      if(!D.esp)D.esp=defD().esp;
    }
  }catch(e){}
  ra();
}
function save(){try{localStorage.setItem('ab_v6',JSON.stringify(D));}catch(e){}}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function ra(){rTabs();rScr();const h=$('hsub');if(h)h.textContent=cajaOk()?`Caja abierta ${fdl(hoy())} · ${f$(cajaM())}`:'Sin caja abierta';}
function rTabs(){$('tabs').innerHTML=TABS.map(t=>`<button class="tab${tab===t.id?' on':''}" onclick="go('${t.id}')">${t.l}</button>`).join('');}
function go(id){tab=id;selCli=null;ra();}
function rScr(){const m={inicio:sI,caja:sCaja,stock:sStock,ventas:sVentas,finanzas:sFin,costos:sCostos,clientes:sCli,reportes:sRep};$('scr').innerHTML=(m[tab]||sI)();}

// ══ INICIO ════════════════════════════════════════════════════════════════════
function sI(){
  const h=hoy(),cv=cajaOk();
  const vh=vdDia(h),iv=sumV(vh),eh=egDia(h),ih=inDia(h),ut=iv+ih-eh;

// ══ REPORTES ══════════════════════════════════════════════════════════════════
function sRep(){
  const tv=sumV(D.ventas),te=D.trans.filter(t=>t.tipo==='eg').reduce((a,t)=>a+t.monto,0);
  const topS=SAB.map((s,i)=>{
    let tot=0;
    D.ventas.forEach(v=>{
      (v.items||[{s:v.sab,q:v.cant,precio:v.precio||.50}]).forEach(it=>{if(it.s===s)tot+=(+it.q||0)*(+(it.precio||.50));});
    });
    return{s,v:+tot.toFixed(2),c:COL[i]};
  }).filter(x=>x.v>0).sort((a,b)=>b.v-a.v).slice(0,8);
  const topSt=SAB.map((s,i)=>({s,v:stockD(s),c:COL[i]})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v).slice(0,8);
  const mxS=topS.length?Math.max(...topS.map(x=>x.v)):1,mxSt=topSt.length?Math.max(...topSt.map(x=>x.v)):1;
  const nC=D.ventas.filter(v=>v.tipo==='comanda').length,nU=D.ventas.filter(v=>v.tipo==='unitario').length;
  const nP=D.ventas.filter(v=>v.tipo==='promo').length,nM=D.ventas.filter(v=>v.tipo==='mayorista').length,nT=nC+nU+nP+nM||1;
  const totEf=D.ventas.filter(v=>v.pago==='efectivo'&&v.estado==='terminado').reduce((a,v)=>a+v.total,0);
  const totTr=D.ventas.filter(v=>v.pago==='transferencia'&&v.estado==='terminado').reduce((a,v)=>a+v.total,0);
  function catTv(k){return D.ventas.reduce((a,v)=>{(v.items||[{s:v.sab,q:v.cant,precio:v.precio||.50}]).forEach(it=>{if((SAB_CAT[it.s]||'clasica')===k)a+=(+it.q||0)*(+(it.precio||.50));});return a;},0);}
  return`<div style="font-size:15px;font-weight:500;margin-bottom:12px">Reportes</div>
  <div class="mrow">
    <div class="met"><div class="mlb">Total vendido</div><div class="mvl" style="color:#1D9E75">${f$(tv)}</div></div>
    <div class="met"><div class="mlb">Egresos</div><div class="mvl" style="color:#D85A30">${f$(te)}</div></div>
    <div class="met"><div class="mlb">Utilidad</div><div class="mvl" style="color:${tv-te>=0?'#1D9E75':'#D85A30'}">${f$(tv-te)}</div></div>
  </div>
  <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:8px">Cobros terminados</div>
    <div class="mrow" style="margin-bottom:0">
      <div class="met"><div class="mlb">Efectivo</div><div class="mvl" style="color:#1D9E75">${f$(totEf)}</div></div>
      <div class="met"><div class="mlb">Transferencia</div><div class="mvl" style="color:#185FA5">${f$(totTr)}</div></div>
    </div>
  </div>
  <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:8px">Por categoría</div>
    ${['clasica','especial','premium'].map(k=>`<div class="rl"><span class="bdg ${CATS[k].cls}">${CATS[k].label}</span><span style="font-weight:500">${f$(catTv(k))}</span></div>`).join('')}</div>
  <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:8px">Tipo de venta</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${[{l:'Comanda',n:nC,c:'#3B6D11'},{l:'Unitario',n:nU,c:'#534AB7'},{l:'Promo',n:nP,c:'#1D9E75'},{l:'Mayorista',n:nM,c:'#D85A30'}].map(x=>`
      <div style="display:flex;align-items:center;gap:6px;font-size:12px">
        <div style="width:26px;height:26px;border-radius:50%;background:${x.c};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff">${Math.round(x.n/nT*100)}%</div>
        <div><div style="font-weight:500">${x.l}</div><div style="color:var(--tx2)">${x.n}</div></div>
      </div>`).join('')}
    </div>
  </div>
  <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:8px">Ingresos por sabor</div>
    ${topS.length===0?'<div style="text-align:center;padding:16px;color:var(--tx2);font-size:12px">Sin datos</div>'
    :`<div class="bc2">${topS.map(x=>`<div class="bcl"><div class="blv">${f$(x.v)}</div><div class="br2" style="height:${Math.max(6,Math.round(x.v/mxS*100))}px;background:${x.c}"></div><div class="bla">${x.s}</div></div>`).join('')}</div>`}
  </div>
  <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:8px">Stock disponible</div>
    ${topSt.length===0?'<div style="text-align:center;padding:16px;color:var(--tx2);font-size:12px">Sin stock</div>'
    :`<div class="bc2">${topSt.map(x=>`<div class="bcl"><div class="blv">${x.v}</div><div class="br2" style="height:${Math.max(6,Math.round(x.v/mxSt*100))}px;background:${x.c}"></div><div class="bla">${x.s}</div></div>`).join('')}</div>`}
  </div>
  ${D.cierres.length>0?`<div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:8px">Cierres de caja</div>
    ${[...D.cierres].reverse().slice(0,7).map(c=>`<div class="li"><div><div class="lt">${fdl(c.fecha)}</div><div class="ls">${c.nV} ventas · Inicio: ${f$(c.mi)}</div></div>
    <div style="text-align:right"><div style="font-size:13px;font-weight:500;color:#1D9E75">${f$(c.tv)}</div><div style="font-size:11px;color:${c.ut>=0?'#1D9E75':'#D85A30'}">Saldo: ${f$(c.saldo)}</div></div></div>`).join('')}
  </div>`:''}`;
}

// ══ MODALES ═══════════════════════════════════════════════════════════════════
let _m=null;
function openM(tipo,ex,ci){
  _m={tipo,ex,ci};
  if(tipo==='comanda'){CI=[{s:SAB[0],q:1,precio:.50}];CC='';CPago='';CEst='pedido';CFecha=hoy();CUsarLibre=false;CLibre=0;}
  if(tipo==='pedido'){CI=[{s:SAB[0],q:1,precio:.50}];}
  rM();
}
function closeM(){_m=null;$('mr').innerHTML='';rScr();}
function rM(){
  if(!_m){$('mr').innerHTML='';return;}
  const{tipo,ex,ci}=_m;
  const mapa={
    apertura:['Abrir caja',tApertura],comanda:['Nueva comanda',tComanda],
    simple:['Venta simple',tSimple],detalle:['Detalle de venta',()=>tDetalle(ex)],
    prod:['Registrar producción',tProd],ajuste:[`Ajustar stock: ${ex}`,()=>tAjuste(ex)],
    egreso:['Registrar egreso',()=>tTrans('eg','egreso')],ingreso:['Registrar ingreso',()=>tTrans('in','ingreso')],
    cliente:['Nuevo cliente',tCliente],pedido:['Nuevo pedido',()=>tPedido(ci)],
    cierre:['Cerrar caja',tCierre],cfg:['Configuración',tCfg]
  };
  const[tit,fn]=mapa[tipo]||['','()=>""'];
  $('mr').innerHTML=`<div class="ov" onclick="if(event.target===this)closeM()">
    <div class="sh"><div class="shh"><div class="sht">${tit}</div><button class="xb" onclick="closeM()">×</button></div>${fn()}</div></div>`;
}

// ── Guardar estado formulario comanda ─────────────────────────────────────────
function saveFormComanda(){
  if($('c-cli'))CC=$('c-cli').value;
  if($('c-est'))CEst=$('c-est').value;
  if($('c-pago'))CPago=$('c-pago').value;
  if($('c-fecha'))CFecha=$('c-fecha').value;
  if($('c-libre-cb'))CUsarLibre=$('c-libre-cb').checked;
  if($('c-lib'))CLibre=+$('c-lib').value||0;
}

// ── APERTURA ─────────────────────────────────────────────────────────────────
function tApertura(){
  return`<div class="warn">Fecha: <strong>${fdl(hoy())}</strong></div>
  <div class="fld"><div class="flb">Monto inicial en caja ($)</div>
    <input type="number" id="a-mi" step=".01" min="0" placeholder="0.00" value="0"></div>
  <div class="inb">El efectivo con que empiezas el día. Se suma a ventas para calcular el saldo al cerrar.</div>
  <button class="btn p fw" onclick="D.caja={fecha:hoy(),monto:+($('a-mi').value||0)};save();closeM()">Abrir caja del día</button>`;
}

// ── COMANDA ───────────────────────────────────────────────────────────────────
function onCIQChange(i,val){CI[i].q=+val||1;actualizarResumenComanda();}
function onCISChange(i,val){saveFormComanda();CI[i].s=val;if(esPremium(val))CI[i].precio=.50;rM();}
function onCIPChange(i,val){CI[i].precio=+val;actualizarResumenComanda();}
function agregarCIItem(){saveFormComanda();CI.push({s:SAB[0],q:1,precio:.50});rM();}
function quitarCIItem(i){if(CI.length<=1)return;saveFormComanda();CI.splice(i,1);rM();}

function actualizarResumenComanda(){
  const esPend=(CEst==='pendiente');
  // Errores de stock
  const sinStock=esPend?[]:CI.filter(it=>stockPrecio(it.s,it.precio)<(+it.q||1)).map(it=>`${it.s} a ${f$(it.precio)}`);
  const errEl=$('c-err');
  if(errEl)errEl.innerHTML=sinStock.length>0
    ?`<div class="errbx">Sin stock suficiente: ${sinStock.join(', ')}.<br>Cambia el estado a "Pendiente" para omitir.</div>`:'';
  // Precio libre wrap
  const libWrap=$('c-lib-wrap');if(libWrap)libWrap.style.display=CUsarLibre?'':'none';
  // Total
  const tot=CUsarLibre?CLibre:totAutoItems(CI);
  const prevEl=$('c-prev');
  if(prevEl)prevEl.innerHTML=CUsarLibre
    ?`Precio libre: <strong>${f$(tot)}</strong>`
    :`${resumenLineas(CI)}<br><strong>Total: ${f$(tot)}</strong>`;
}

function tComanda(){
  const esPend=(CEst==='pendiente');
  const sinStockIni=esPend?[]:CI.filter(it=>stockPrecio(it.s,it.precio)<(+it.q||1)).map(it=>`${it.s} a ${f$(it.precio)}`);
  const tot=CUsarLibre?CLibre:totAutoItems(CI);
  const itemsHtml=CI.map((it,i)=>{
    const sk=D.stock[it.s]||{d25:0,d50:0},cat=catDe(it.s),esP=esPremium(it.s);
    const stk=stockPrecio(it.s,it.precio),sinSt=!esPend&&stk<(+it.q||1);
    const precioOpts=esP
      ?`<option value="0.5">$0.50</option>`
      :`<option value="0.25"${it.precio===.25?' selected':''}>$0.25 (${sk.d25||0})</option>
        <option value="0.5"${it.precio===.50?' selected':''}>$0.50 (${sk.d50||0})</option>`;
    return`<div class="ci${sinSt?' sin-stock':''}">
      <select onchange="onCISChange(${i},this.value)">
        ${SAB.map(s=>`<option value="${s}"${s===it.s?' selected':''}>${s}</option>`).join('')}
      </select>
      <select onchange="onCIPChange(${i},this.value)" style="${esP?'opacity:.5;pointer-events:none':''}">
        ${precioOpts}
      </select>
      <input type="number" min="1" value="${it.q}" oninput="onCIQChange(${i},this.value)">
      <button class="del" onclick="quitarCIItem(${i})">×</button>
    </div>`;
  }).join('');
  return`<div class="fld"><div class="flb">Cliente / mesa (opcional)</div>
    <input id="c-cli" placeholder="Ej: Emilio, Mesa 3..." value="${CC}"></div>
  <div style="font-size:12px;color:var(--tx2);margin-bottom:4px">Sabor &nbsp;·&nbsp; Precio &nbsp;·&nbsp; Cantidad</div>
  <div id="c-items">${itemsHtml}</div>
  <button class="btn op fw" style="margin-bottom:10px" onclick="agregarCIItem()">+ Agregar sabor</button>
  <div id="c-err">${sinStockIni.length>0?`<div class="errbx">Sin stock: ${sinStockIni.join(', ')}.<br>Cambia a "Pendiente" si lo prepararás después.</div>`:''}</div>
  <div class="fld"><div class="flb">Estado del pedido</div>
    <select id="c-est" onchange="CEst=this.value;actualizarResumenComanda()">
      <option value="pedido"${CEst==='pedido'?' selected':''}>Pedido — descontar stock ahora</option>
      <option value="pendiente"${CEst==='pendiente'?' selected':''}>Pendiente — en preparación (sin stock)</option>
    </select></div>
  <div class="fld"><div class="flb">Método de pago (si ya canceló)</div>
    <select id="c-pago">
      <option value=""${CPago===''?' selected':''}>Sin definir</option>
      <option value="efectivo"${CPago==='efectivo'?' selected':''}>Efectivo</option>
      <option value="transferencia"${CPago==='transferencia'?' selected':''}>Transferencia</option>
    </select></div>
  <div class="chk-row">
    <input type="checkbox" id="c-libre-cb" onchange="CUsarLibre=this.checked;actualizarResumenComanda()" ${CUsarLibre?'checked':''}>
    <div class="chk-lbl">Precio libre (mayorista)</div>
  </div>
  <div class="fld" id="c-lib-wrap" style="${CUsarLibre?'':'display:none'}">
    <input type="number" id="c-lib" step=".01" min="0" value="${CLibre}" oninput="CLibre=+this.value||0;actualizarResumenComanda()" placeholder="0.00">
  </div>
  <div class="highlight" id="c-prev">${CUsarLibre?`Precio libre: <strong>${f$(tot)}</strong>`:`${resumenLineas(CI)}<br><strong>Total: ${f$(tot)}</strong>`}</div>
  <div class="fld"><div class="flb">Fecha</div><input type="date" id="c-fecha" value="${CFecha||hoy()}"></div>
  <button class="btn p fw" onclick="subComanda()">Registrar comanda</button>`;
}
function subComanda(){
  const cli=($('c-cli')?.value||CC).trim();
  const fecha=$('c-fecha')?.value||hoy();
  let estado=$('c-est')?.value||CEst;
  const pago=$('c-pago')?.value||CPago;
  if(pago&&estado==='pedido')estado='pendiente';
  const items=CI.map(it=>({s:it.s,q:+it.q||1,precio:+(it.precio||.50)}));
  if(estado!=='pendiente'){
    const sin=checkStock(items);
    if(sin.length>0){alert('Stock insuficiente:\n'+sin.join('\n')+'\n\nCambia el estado a "Pendiente" si lo prepararás después.');return;}
  }
  const tot=calcTotal(items,CLibre,CUsarLibre);
  const cant=items.reduce((a,it)=>a+it.q,0);
  const venta={id:uid(),tipo:'comanda',cliente:cli,items,cant,total:tot,fecha,sab:items[0].s,estado,pago,stockDeducted:false};
  if(estado!=='pendiente')deducirStock(venta);
  D.ventas.push(venta);save();closeM();
}

// ── VENTA SIMPLE ──────────────────────────────────────────────────────────────
function tSimple(){
  const s0=SAB[0],cat0=catDe(s0),esP0=esPremium(s0);
  const precioOpts0=esP0?`<option value="0.5">$0.50</option>`
    :`<option value="0.25">$0.25 (${D.stock[s0]?.d25||0} disp.)</option><option value="0.5">$0.50 (${D.stock[s0]?.d50||0} disp.)</option>`;
  return`<div style="display:flex;gap:8px">
    <div class="fld" style="flex:1"><div class="flb">Sabor</div>
      <select id="s-sab" onchange="rVE()">
        ${SAB.map(s=>`<option value="${s}">${s} — ${catDe(s).label} (${stockD(s)} disp.)</option>`).join('')}
      </select></div>
    <div class="fld" style="width:110px"><div class="flb">Precio</div>
      <select id="s-precio" onchange="rVE()">${precioOpts0}</select></div>
  </div>
  <div class="fld"><div class="flb">Tipo</div>
    <select id="s-tipo" onchange="rVE()">
      <option value="u">Unitario</option>
      <option value="pr">Promo (mismo sabor)</option>
      <option value="may">Mayorista (precio libre)</option>
    </select></div>
  <div id="s-extra">
    <div class="fld"><div class="flb">Cantidad de bolos</div><input type="number" id="s-cant" min="1" value="1" oninput="uVP()"></div>
  </div>
  <div id="s-prev" class="inb"></div>
  <div class="fld"><div class="flb">Estado</div>
    <select id="s-est">
      <option value="pedido">Pedido — descontar stock</option>
      <option value="pendiente">Pendiente — en preparación</option>
      <option value="terminado">Terminado — ya cobrado</option>
    </select></div>
  <div class="fld"><div class="flb">Método de pago</div>
    <select id="s-pago">
      <option value="">Sin definir</option><option value="efectivo">Efectivo</option><option value="transferencia">Transferencia</option>
    </select></div>
  <div class="fld"><div class="flb">Fecha</div><input type="date" id="s-fecha" value="${hoy()}"></div>
  <button class="btn p fw" onclick="subSimple()">Guardar venta</button>`;
}
function getSab(){const el=$('s-sab');return el?el.value:SAB[0];}
function getSPrecio(){const el=$('s-precio');return el?+(el.value||.50):.50;}
function rVE(){
  const sab=getSab(),pr=getSPrecio(),cat=catDe(sab),tipo=$('s-tipo')?.value;
  const esP=esPremium(sab);
  // Actualizar opciones de precio al cambiar sabor
  const prEl=$('s-precio');
  if(prEl){
    const d25=D.stock[sab]?.d25||0,d50=D.stock[sab]?.d50||0;
    prEl.innerHTML=esP
      ?`<option value="0.5">$0.50</option>`
      :`<option value="0.25">$0.25 (${d25} disp.)</option><option value="0.5">$0.50 (${d50} disp.)</option>`;
    prEl.disabled=esP;
  }
  const promoDisp=cat.promo;
  let h='';
  if(tipo==='u'){
    h=`<div class="fld"><div class="flb">Cantidad de bolos</div><input type="number" id="s-cant" min="1" value="1" oninput="uVP()"></div>`;
  } else if(tipo==='pr'){
    if(!promoDisp){h=`<div class="errbx">La categoría <strong>${cat.label}</strong> no tiene promo disponible.</div>`;$('s-extra').innerHTML=h;uVP();return;}
    const pp=pr===.25?promoDisp.p25:promoDisp.p50;
    h=`<div class="fld"><div class="flb">Grupos de ${promoDisp.n} bolos → promo ${f$(pp)}</div><input type="number" id="s-promos" min="1" value="1" oninput="uVP()"></div>`;
  } else {
    h=`<div class="fld"><div class="flb">Cantidad de bolos</div><input type="number" id="s-cant" min="1" value="10" oninput="uVP()"></div>
    <div class="fld"><div class="flb">Precio total cobrado ($)</div><input type="number" id="s-monto" step=".01" min="0" value="0" oninput="uVP()"></div>
    <div class="fld"><div class="flb">Cliente (opcional)</div><input id="s-cli" placeholder="Nombre del cliente"></div>`;
  }
  $('s-extra').innerHTML=h;uVP();
}
function uVP(){
  const tipo=$('s-tipo')?.value,sab=getSab(),pr=getSPrecio(),cat=catDe(sab),promoDisp=cat.promo;
  const pp=promoDisp?(pr===.25?promoDisp.p25:promoDisp.p50):null;
  let tot=0,det='';
  if(tipo==='u'){const c=+($('s-cant')?.value||1);tot=+(c*pr).toFixed(2);det=`${c} bolo${c!==1?'s':''} × ${f$(pr)}`;}
  else if(tipo==='pr'&&pp){const g=+($('s-promos')?.value||1);tot=+(g*pp).toFixed(2);det=`${g} promo${g!==1?'s':''} × ${f$(pp)} = ${g*promoDisp.n} bolos`;}
  else{tot=+($('s-monto')?.value||0);det=`${$('s-cant')?.value||0} bolos (mayorista)`;}
  const el=$('s-prev');if(el)el.innerHTML=`${det} → <strong>${f$(tot)}</strong>`;
}
function subSimple(){
  const tipo=$('s-tipo').value,sab=getSab(),precio=getSPrecio(),fecha=$('s-fecha')?.value||hoy();
  let estado=$('s-est')?.value||'pedido',pago=$('s-pago')?.value||'';
  const cat=catDe(sab),promoDisp=cat.promo;
  const pp=promoDisp?(precio===.25?promoDisp.p25:promoDisp.p50):null;
  if(pago&&estado==='pedido')estado='pendiente';
  let tot,cant,promos=0;
  if(tipo==='u'){cant=+($('s-cant')?.value||1);tot=+(cant*precio).toFixed(2);}
  else if(tipo==='pr'){
    if(!pp){alert('Este sabor no tiene promo disponible.');return;}
    promos=+($('s-promos')?.value||1);cant=promos*promoDisp.n;tot=+(promos*pp).toFixed(2);
  } else {cant=+($('s-cant')?.value||10);tot=+($('s-monto')?.value||0);}
  const cli=tipo==='may'?($('s-cli')?.value||''):'';
  if(estado!=='pendiente'&&stockPrecio(sab,precio)<cant){
    alert(`Stock insuficiente de ${sab} a ${f$(precio)}.\nTienes ${stockPrecio(sab,precio)}, necesitas ${cant}.\nCambia el estado a "Pendiente" si lo prepararás después.`);return;
  }
  const venta={id:uid(),sab,tipo:tipo==='u'?'unitario':tipo==='pr'?'promo':'mayorista',cant,promos,total:tot,fecha,cliente:cli,precio,items:[{s:sab,q:cant,precio}],estado,pago,stockDeducted:false};
  if(estado!=='pendiente')deducirStock(venta);
  D.ventas.push(venta);save();closeM();
}

// ── DETALLE DE VENTA ──────────────────────────────────────────────────────────
function tDetalle(id){
  const v=D.ventas.find(x=>x.id===id);
  if(!v)return'<div class="emp">Venta no encontrada</div>';
  const est=v.estado||'pedido',pago=v.pago||'';
  return`<div style="margin-bottom:12px">
    ${v.cliente?`<div style="font-size:15px;font-weight:500;margin-bottom:2px">${v.cliente}</div>`:''}
    <div style="font-size:12px;color:var(--tx2);margin-bottom:6px">${vDesc(v)} · ${fd(v.fecha)}</div>
    <div style="font-size:22px;font-weight:500;color:#1D9E75;margin-bottom:8px">${f$(v.total)}</div>
    <div style="display:flex;gap:4px;flex-wrap:wrap">${eBadge(est)}${pBadge(pago)}
      <span class="bdg" style="background:var(--bg2);color:var(--tx2);margin-left:4px">${v.stockDeducted?'Stock descontado':'No descontó stock'}</span></div>
  </div>
  <div class="sep"></div>
  <div style="font-size:12px;font-weight:500;color:var(--tx2);margin:10px 0 8px">Estado del pedido</div>
  <div style="display:flex;gap:6px;margin-bottom:14px">
    ${Object.entries(ESTADOS).map(([k,e])=>`<button class="est-btn ${e.cls}" style="opacity:${est===k?1:.4};${est===k?'font-weight:700':''}" onclick="setEst('${v.id}','${k}')">${e.l}</button>`).join('')}
  </div>
  <div style="font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:8px">Método de pago</div>
  <div style="display:flex;gap:6px;margin-bottom:14px">
    ${Object.entries(PAGOS).map(([k,p])=>`<button class="pago-btn ${p.cls}" style="opacity:${pago===k?1:.4};${pago===k?'font-weight:700':''}" onclick="setPag('${v.id}','${k}')">${p.l}</button>`).join('')}
  </div>
  <div class="sep"></div>
  <button class="btn od fw" style="margin-top:10px"
    onclick="if(confirm('¿Eliminar esta venta?\\n${v.stockDeducted?'El stock se repondrá.':'El stock NO se repondrá (no fue descontado).'}')){delV('${v.id}');}">Eliminar venta</button>`;
}
function setEst(id,nuevoEst){
  const v=D.ventas.find(x=>x.id===id);if(!v)return;
  const antEst=v.estado||'pedido';
  if(antEst==='pendiente'&&nuevoEst!=='pendiente'&&!v.stockDeducted){
    const its=v.items||[{s:v.sab,q:v.cant,precio:v.precio||.50}];
    const sin=checkStock(its);
    if(sin.length>0){if(!confirm(`Stock insuficiente:\n${sin.join('\n')}\n\n¿Continuar sin descontar?`))return;}
    else{deducirStock(v);}
  }
  if(nuevoEst==='pendiente'&&antEst!=='pendiente'&&v.stockDeducted)restaurarStock(v);
  v.estado=nuevoEst;save();rM();rScr();
}
function setPag(id,pago){const v=D.ventas.find(x=>x.id===id);if(!v)return;v.pago=pago;if(pago&&(v.estado||'pedido')==='pedido')v.estado='pendiente';save();rM();rScr();}
function delV(id){const v=D.ventas.find(x=>x.id===id);if(v&&v.stockDeducted)restaurarStock(v);D.ventas=D.ventas.filter(x=>x.id!==id);save();closeM();}

// ── PRODUCCIÓN (con split $0.25 / $0.50 para Clásica y Especial) ─────────────
function tProd(){
  return`<div class="fld"><div class="flb">Sabor</div>
    <select id="p-sab" onchange="updProdInfo()">${SAB.map(s=>`<option value="${s}">${s} — ${catDe(s).label}</option>`).join('')}</select></div>
  <div id="p-split-wrap">
    <div class="inb" style="margin-bottom:6px">
      ¿Cuántos bolos de cada tanda van a <strong>$0.25</strong> y cuántos a <strong>$0.50</strong>?<br>
      <span style="color:var(--tx3)">Total por tanda: ${BT} bolos. Premium siempre a $0.50.</span>
    </div>
    <div class="fld"><div class="flb">Número de tandas</div>
      <input type="number" id="p-tan" min="1" value="1" oninput="updProdInfo()"></div>
    <div class="prod-split">
      <div>
        <div class="prod-split-lbl">Bolos a <span class="precio-tag precio-25">$0.25</span> por tanda</div>
        <input type="number" id="p-n25" min="0" max="${BT}" value="0" oninput="updProdInfo()">
      </div>
      <div>
        <div class="prod-split-lbl">Bolos a <span class="precio-tag precio-50">$0.50</span> por tanda</div>
        <input type="number" id="p-n50" min="0" max="${BT}" value="${BT}" oninput="updProdInfo()">
      </div>
    </div>
    <div class="inb" id="p-inf">→ <strong>${BT}</strong> bolos por tanda (0 a $0.25, ${BT} a $0.50)</div>
  </div>
  <div class="fld"><div class="flb">Fecha</div><input type="date" id="p-fecha" value="${hoy()}"></div>
  <button class="btn p fw" onclick="subProd()">Registrar producción</button>`;
}
function updProdInfo(){
  const sab=$('p-sab')?.value||SAB[0],esP=esPremium(sab);
  const tan=+($('p-tan')?.value||1);
  const splitWrap=$('p-split-wrap');
  if(esP){
    // Premium: todo a $0.50, ocultar split
    if($('p-n25')){$('p-n25').value=0;$('p-n25').disabled=true;}
    if($('p-n50')){$('p-n50').value=BT;$('p-n50').disabled=true;}
  } else {
    if($('p-n25'))$('p-n25').disabled=false;
    if($('p-n50'))$('p-n50').disabled=false;
  }
  const n25=+($('p-n25')?.value||0),n50=+($('p-n50')?.value||BT);
  const tot25=tan*n25,tot50=tan*n50,totBol=tot25+tot50;
  const inf=$('p-inf');
  if(inf){
    if(esP){inf.innerHTML=`→ <strong>${tan*BT}</strong> bolos a <span class="precio-tag precio-50">$0.50</span>`;}
    else{inf.innerHTML=`→ <strong>${totBol}</strong> bolos totales: <span class="precio-tag precio-25">${tot25} a $0.25</span> + <span class="precio-tag precio-50">${tot50} a $0.50</span>${n25+n50!==BT?` <span style="color:#E24B4A">(suman ${n25+n50}/${BT})</span>`:' ✓'}`;}
  }
}
function subProd(){
  const sab=$('p-sab').value,tan=+($('p-tan')?.value||1),esP=esPremium(sab);
  let n25=0,n50=BT;
  if(!esP){n25=+($('p-n25')?.value||0);n50=+($('p-n50')?.value||BT);}
  if(!esP&&n25+n50!==BT){alert(`Los bolos por tanda deben sumar ${BT}.\nActualmente suman ${n25+n50}.`);return;}
  const tot25=tan*n25,tot50=tan*n50,totBol=tot25+tot50;
  const sk=D.stock[sab];
  sk.d25+=tot25;sk.d50+=tot50;sk.p+=totBol;
  save();closeM();
}

// ── AJUSTE DE STOCK ───────────────────────────────────────────────────────────
function tAjuste(sab){
  const sk=D.stock[sab]||{d25:0,d50:0,p:0},esP=esPremium(sab),cat=catDe(sab);
  return`<div class="inb">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <strong>${sab}</strong><span class="bdg ${cat.cls}">${cat.label}</span>
    </div>
    ${esP
      ?`$0.50: <strong>${sk.d50||0} bolos</strong>`
      :`<span class="precio-tag precio-25" style="margin-right:6px">${sk.d25||0} a $0.25</span><span class="precio-tag precio-50">${sk.d50||0} a $0.50</span>`}
    <br>Producidos total: ${sk.p||0}
  </div>
  ${esP?'':`<div class="fld"><div class="flb">Bolos disponibles a $0.25</div>
    <input type="number" id="aj-25" min="0" value="${sk.d25||0}"></div>`}
  <div class="fld"><div class="flb">Bolos disponibles a $0.50</div>
    <input type="number" id="aj-50" min="0" value="${sk.d50||0}"></div>
  <button class="btn p fw" onclick="D.stock['${sab}'].d25=${esP?0:0};D.stock['${sab}'].d25=+($('aj-25')?.value||0);D.stock['${sab}'].d50=+($('aj-50')?.value||0);save();closeM()">Actualizar stock</button>`;
}

// ── TRANSACCIONES ─────────────────────────────────────────────────────────────
function tTrans(tipo,label){
  const cats=tipo==='eg'?CEG:CIN;
  return`<div class="fld"><div class="flb">Categoría</div>
    <select id="tr-cat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div>
  <div class="fld"><div class="flb">Monto ($)</div>
    <input type="number" id="tr-monto" step=".01" min="0" placeholder="0.00"></div>
  <div class="fld"><div class="flb">Nota (opcional)</div>
    <input id="tr-nota" placeholder="Descripción..."></div>
  <div class="fld"><div class="flb">Fecha</div>
    <input type="date" id="tr-fecha" value="${hoy()}"></div>
  <button class="btn ${tipo==='eg'?'d':'s'} fw" onclick="D.trans.push({id:uid(),tipo:'${tipo}',cat:$('tr-cat').value,monto:+($('tr-monto')?.value||0),nota:$('tr-nota')?.value||'',fecha:$('tr-fecha')?.value||hoy()});save();closeM()">Guardar ${label}</button>`;
}

// ── CLIENTE MAYORISTA ─────────────────────────────────────────────────────────
function tCliente(){
  return`<div class="fld"><div class="flb">Nombre completo</div><input id="cl-nom" placeholder="Ej: María González"></div>
  <div class="fld"><div class="flb">Teléfono</div><input id="cl-tel" placeholder="0999..."></div>
  <div class="fld"><div class="flb">Barrio / Sector</div><input id="cl-bar" placeholder="Ej: Barrio La Paz"></div>
  <button class="btn p fw" onclick="const n=($('cl-nom')?.value||'').trim();if(!n)return alert('Ingresa el nombre');D.clientes.push({nombre:n,tel:$('cl-tel')?.value||'',barrio:$('cl-bar')?.value||'',pedidos:[]});save();closeM()">Guardar cliente</button>`;
}

// ── PEDIDO MAYORISTA ──────────────────────────────────────────────────────────
function tPedido(ci){
  const itemsHtml=CI.map((it,i)=>{
    const esP=esPremium(it.s),sk=D.stock[it.s]||{d25:0,d50:0};
    const precioOpts=esP?`<option value="0.5">$0.50</option>`
      :`<option value="0.25"${it.precio===.25?' selected':''}>$0.25</option><option value="0.5"${it.precio===.50?' selected':''}>$0.50</option>`;
    return`<div class="ci">
      <select onchange="CI[${i}].s=this.value;if(esPremium(this.value))CI[${i}].precio=.50">
        ${SAB.map(s=>`<option value="${s}"${s===it.s?' selected':''}>${s}</option>`).join('')}
      </select>
      <select onchange="CI[${i}].precio=+this.value">${precioOpts}</select>
      <input type="number" min="1" value="${it.q}" oninput="CI[${i}].q=+this.value||1">
      <button class="del" onclick="CI.splice(${i},1);rM()">×</button>
    </div>`;
  }).join('');
  return`${itemsHtml}
  <button class="btn op fw" style="margin-bottom:10px" onclick="CI.push({s:SAB[0],q:1,precio:.50});rM()">+ Agregar sabor</button>
  <div class="fld"><div class="flb">Precio total pactado ($)</div>
    <input type="number" id="pd-precio" step=".01" min="0" placeholder="0.00"></div>
  <div class="fld"><div class="flb">Estado</div>
    <select id="pd-est">
      <option value="pedido">Pedido — acordado</option>
      <option value="pendiente">Pendiente — en preparación</option>
    </select></div>
  <div class="fld"><div class="flb">Nota (opcional)</div>
    <input id="pd-nota" placeholder="Fecha de entrega, detalles..."></div>
  <button class="btn p fw" onclick="subPedido(${ci})">Registrar pedido</button>`;
}
function subPedido(ci){
  const tot=+($('pd-precio')?.value||0),nota=$('pd-nota')?.value||'',estado=$('pd-est')?.value||'pedido';
  const cant=CI.reduce((a,it)=>a+(+it.q||0),0),desc=CI.map(it=>`${it.q}×${it.s} ${f$(+(it.precio||.50))}`).join(', ');
  D.clientes[ci].pedidos.push({desc,sab:CI[0].s,cant,total:tot,nota,fecha:hoy()});
  const items=CI.map(it=>({s:it.s,q:+it.q,precio:+(it.precio||.50)}));
  const venta={id:uid(),tipo:'comanda',cliente:D.clientes[ci].nombre,items,cant,total:tot,fecha:hoy(),sab:items[0].s,estado,pago:'',stockDeducted:false};
  if(estado!=='pendiente')deducirStock(venta);
  D.ventas.push(venta);save();selCli=ci;closeM();
}

// ── CIERRE DE CAJA ────────────────────────────────────────────────────────────
function tCierre(){
  const h=hoy(),vh=vdDia(h),tv=sumV(vh),te=egDia(h),ti=inDia(h),ut=tv+ti-te,mi=cajaM(),saldo=mi+tv+ti-te;
  return`<div class="warn"><strong>Resumen del día — ${fdl(h)}</strong></div>
  <div class="mrow">
    <div class="met"><div class="mlb">Monto inicial</div><div class="mvl" style="font-size:15px;color:#534AB7">${f$(mi)}</div></div>
    <div class="met"><div class="mlb">Ventas del día</div><div class="mvl" style="font-size:15px;color:#1D9E75">${f$(tv)}</div><div class="msb">${vh.length} reg.</div></div>
    <div class="met"><div class="mlb">Egresos</div><div class="mvl" style="font-size:15px;color:#D85A30">${f$(te)}</div></div>
  </div>
  <div class="highlight" style="margin-bottom:12px">Saldo final estimado: <strong>${f$(saldo)}</strong></div>
  <div class="inb">Al confirmar se guarda el resumen y la caja queda cerrada.</div>
  <button class="btn d fw" onclick="D.cierres.push({id:uid(),fecha:hoy(),nV:${vh.length},tv:${tv},te:${te},ti:${ti},ut:${ut},mi:${mi},saldo:${saldo}});D.caja=null;save();closeM()">Confirmar cierre de caja</button>
  <button class="btn op fw" onclick="closeM()">Cancelar</button>`;
}

// ── CONFIGURACIÓN ─────────────────────────────────────────────────────────────
function openCfg(){_m={tipo:'cfg'};rM();}
function tCfg(){
  return`<div class="inb">
    <strong>Categorías y precios:</strong><br>
    · <span class="bdg cat-clasica">Clásica</span> Vainilla, Oreo, Maracuyá, Fresa, Piña, Coco, Café, Mango, Banano, Chocolate<br>
    &nbsp;&nbsp;Precio: $0.25 o $0.50 según producción<br><br>
    · <span class="bdg cat-especial">Especial</span> Pay Limón, Galleta María, Ronpasa<br>
    &nbsp;&nbsp;Precio: $0.25 o $0.50 según producción<br><br>
    · <span class="bdg cat-premium">Premium</span> Queso, Cheesecake — siempre $0.50
  </div>
  <div class="sep"></div>
  <div style="font-size:13px;font-weight:500;margin-bottom:8px">Exportar datos</div>
  <button class="btn op fw" onclick="expV()">Exportar ventas (CSV)</button>
  <button class="btn op fw" style="margin-top:0" onclick="expT()">Exportar transacciones (CSV)</button>
  <button class="btn op fw" style="margin-top:0" onclick="expC()">Exportar cierres (CSV)</button>
  <div class="sep"></div>
  <div class="inb">${D.ventas.length} ventas · ${D.trans.length} transacciones · ${D.clientes.length} clientes · ${D.cierres.length} cierres</div>
  <button class="btn od fw" onclick="if(confirm('¿Borrar TODOS los datos? No se puede deshacer.')){D=defD();save();closeM();}">Restablecer todos los datos</button>`;
}
function expV(){
  const r=[['Fecha','Cliente','Tipo','Detalle','Bolos','Total','Estado','Pago','StockDescontado'],
    ...D.ventas.map(v=>[v.fecha,v.cliente||'',v.tipo,vDesc(v),v.cant,v.total,v.estado||'pedido',v.pago||'',v.stockDeducted?'si':'no'])];
  dl(r.map(x=>x.join(',')).join('\n'),'ventas.csv');
}
function expT(){
  const r=[['Fecha','Tipo','Categoria','Monto','Nota'],
    ...D.trans.map(t=>[t.fecha,t.tipo==='eg'?'egreso':'ingreso',t.cat,t.monto,t.nota||''])];
  dl(r.map(x=>x.join(',')).join('\n'),'transacciones.csv');
}
function expC(){
  const r=[['Fecha','MontoInicial','Ventas','Egresos','Utilidad','SaldoFinal','NVentas'],
    ...D.cierres.map(c=>[c.fecha,c.mi,c.tv,c.te,c.ut,c.saldo,c.nV])];
  dl(r.map(x=>x.join(',')).join('\n'),'cierres.csv');
}
function dl(csv,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=name;a.click();}

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
load();
</script>
