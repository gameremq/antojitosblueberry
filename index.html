<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#534AB7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Antojitos BB">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Antojitos Blueberry</title>
<style>
:root{--bg1:#fff;--bg2:#f5f5f5;--bg3:#eee;--tx1:#1a1a1a;--tx2:#666;--tx3:#999;--bd1:rgba(0,0,0,.1);--bd2:rgba(0,0,0,.2)}
@media(prefers-color-scheme:dark){:root{--bg1:#1e1e1e;--bg2:#2a2a2a;--bg3:#141414;--tx1:#f0f0f0;--tx2:#aaa;--tx3:#777;--bd1:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.2)}}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent}
body{background:var(--bg3);min-height:100vh}
input,select{width:100%;padding:8px 10px;border:0.5px solid var(--bd2);border-radius:8px;background:var(--bg1);color:var(--tx1);font-size:13px}
input:focus,select:focus{outline:none;border-color:#534AB7}
button{cursor:pointer;font-family:inherit}
.app{max-width:500px;margin:0 auto}
.hdr{background:#534AB7;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-radius:12px 12px 0 0}
.hdr-t{font-size:16px;font-weight:500}
.hdr-s{font-size:11px;opacity:.7;margin-top:1px}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:5px 12px;font-size:12px}
.tabs{display:flex;background:var(--bg1);border-bottom:0.5px solid var(--bd1);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 11px;border:none;background:transparent;font-size:11px;color:var(--tx2);border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:#534AB7;border-bottom-color:#534AB7;font-weight:500}
.scr{padding:14px;background:var(--bg2);min-height:calc(100vh - 120px)}
.card{background:var(--bg1);border:0.5px solid var(--bd1);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.mrow{display:flex;gap:8px;margin-bottom:8px}
.met{background:var(--bg2);border-radius:8px;padding:10px 12px;flex:1;min-width:0}
.mlb{font-size:11px;color:var(--tx2);margin-bottom:2px}
.mvl{font-size:17px;font-weight:500;line-height:1.2}
.msb{font-size:10px;color:var(--tx3);margin-top:2px}
.btn{border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;border:1px solid}
.p{background:#534AB7;color:#fff;border-color:#534AB7}
.s{background:#1D9E75;color:#fff;border-color:#1D9E75}
.d{background:#D85A30;color:#fff;border-color:#D85A30}
.op{background:transparent;color:#534AB7;border-color:#534AB7}
.od{background:transparent;color:#D85A30;border-color:#D85A30}
.fw{width:100%;display:block;text-align:center;margin-bottom:8px}
.sm{padding:5px 10px;font-size:12px}
.bdg{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
.bp{background:#EEEDFE;color:#3C3489}
.bt{background:#E1F5EE;color:#0F6E56}
.bc{background:#FAECE7;color:#712B13}
.ba{background:#FAEEDA;color:#633806}
.br{background:#FCEBEB;color:#A32D2D}
.bg{background:#EAF3DE;color:#27500A}
.bbl{background:#E6F1FB;color:#0C447C}
/* Estado badges */
.est-pedido{background:#FAEEDA;color:#633806;border:1px solid #FAC775}
.est-pendiente{background:#FCEBEB;color:#A32D2D;border:1px solid #F09595}
.est-terminado{background:#EAF3DE;color:#27500A;border:1px solid #C0DD97}
/* Pago badges */
.pago-efectivo{background:#E1F5EE;color:#085041}
.pago-transferencia{background:#E6F1FB;color:#0C447C}
/* Venta cards con estado */
.vcard{background:var(--bg1);border:0.5px solid var(--bd1);border-radius:12px;padding:11px 13px;margin-bottom:7px;cursor:pointer}
.vcard.pedido{border-left:3px solid #BA7517}
.vcard.pendiente{border-left:3px solid #E24B4A}
.vcard.terminado{border-left:3px solid #1D9E75}
/* Filter tabs */
.ftab{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.ftab button{padding:5px 11px;font-size:11px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--tx2)}
.ftab button.on{background:#534AB7;color:#fff;border-color:#534AB7;font-weight:500}
/* Estado/pago action buttons */
.est-btn{padding:8px 10px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid;cursor:pointer;flex:1;text-align:center}
.pago-btn{padding:8px 10px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid;cursor:pointer;flex:1;text-align:center}
.fld{margin-bottom:11px}
.flb{font-size:12px;color:var(--tx2);margin-bottom:4px}
.rb{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.li{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--bd1)}
.li:last-child{border-bottom:none}
.lt{font-size:13px;font-weight:500;margin-bottom:2px}
.ls{font-size:11px;color:var(--tx2);line-height:1.5}
.lv{font-size:14px;font-weight:500;text-align:right;flex-shrink:0;margin-left:10px}
.emp{text-align:center;padding:40px 0;color:var(--tx2);font-size:13px}
.inb{background:var(--bg2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--tx2);margin-bottom:12px;line-height:1.6}
.pb{height:4px;background:var(--bd1);border-radius:2px;margin-top:6px;overflow:hidden}
.pf{height:100%;border-radius:2px}
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.52);z-index:10;display:flex;align-items:flex-end}
.sh{background:var(--bg1);border-radius:12px 12px 0 0;padding:16px;width:100%;max-height:88vh;overflow-y:auto}
.shh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sht{font-size:15px;font-weight:500}
.xb{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:none;font-size:18px;line-height:28px;text-align:center;color:var(--tx2)}
.av{width:38px;height:38px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#3C3489;flex-shrink:0}
.sep{height:0.5px;background:var(--bd1);margin:10px 0}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ab{padding:10px;border-radius:8px;border:0.5px solid var(--bd2);background:var(--bg2);color:var(--tx1);font-size:12px;font-weight:500;text-align:center;width:100%}
.bc2{display:flex;align-items:flex-end;gap:4px;height:120px;padding:0 4px}
.bcl{display:flex;flex-direction:column;align-items:center;flex:1}
.br2{width:100%;border-radius:3px 3px 0 0}
.bla{font-size:9px;color:var(--tx3);margin-top:3px;text-align:center;max-width:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.blv{font-size:9px;color:var(--tx2);margin-bottom:2px}
.fch{display:inline-block;padding:4px 10px;font-size:12px;border-radius:6px;border:1px solid var(--bd1);margin:3px;cursor:pointer;background:var(--bg2);color:var(--tx2)}
.fch.sel{background:#534AB7;color:#fff;border-color:#534AB7}
.ci{display:flex;align-items:center;gap:8px;padding:7px;background:var(--bg2);border-radius:8px;margin-bottom:6px}
.ci select{flex:1;font-size:12px;padding:5px 8px}
.ci input[type=number]{width:55px;flex-shrink:0;font-size:12px;padding:5px 8px;text-align:center}
.ci .del{flex-shrink:0;background:none;border:none;color:#E24B4A;font-size:20px;padding:0 4px;line-height:1}
.cajav{background:#E1F5EE;border:1px solid #5DCAA5;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.cajac{background:var(--bg2);border:0.5px solid var(--bd1);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.ptab{display:flex;border:1px solid var(--bd2);border-radius:8px;overflow:hidden;margin-bottom:12px}
.ptab button{flex:1;padding:7px 4px;font-size:11px;border:none;background:transparent;color:var(--tx2)}
.ptab button.on{background:#534AB7;color:#fff;font-weight:500}
.radio-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid var(--bd1);margin-bottom:6px;cursor:pointer;background:var(--bg1)}
.radio-row.sel{border-color:#534AB7;background:#EEEDFE}
.radio-row input[type=radio]{width:auto;flex-shrink:0;margin-top:3px}
.radio-label{font-size:13px;color:var(--tx1);font-weight:500}
.radio-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.highlight{background:#E1F5EE;border:1px solid #5DCAA5;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px}
.warn{background:#FAEEDA;border:1px solid #FAC775;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#633806}
.rl{display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--bd1);font-size:12px}
.rl:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <div><div class="hdr-t">Antojitos Blueberry</div><div class="hdr-s" id="hsub">Panel de gestión</div></div>
    <button class="hdr-btn" onclick="openCfg()">Configurar</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="scr" id="scr"></div>
  <div id="mr"></div>
</div>
<script>
// ── Constantes ──────────────────────────────────────────────────────────────
const SAB=['Vainilla','Oreo','Maracuyá','Pay Limón','Fresa','Piña','Coco','Cheesecake','Café','Mango','Galleta María','Banano','Queso','Chocolate','Ronpasa'];
const COL=['#534AB7','#1D9E75','#D85A30','#BA7517','#E24B4A','#185FA5','#993556','#3B6D11','#854F0B','#0F6E56','#712B13','#633806','#3C3489','#993C1D','#888780'];
const CEG=['Transporte','Ingredientes','Empaques','Gas/Electricidad','Inversión en stock','Publicidad','Otros gastos'];
const CIN=['Venta adicional','Anticipo cliente','Devolución','Otro ingreso'];
const TABS=[{id:'inicio',l:'Inicio'},{id:'caja',l:'Caja'},{id:'stock',l:'Stock'},{id:'ventas',l:'Ventas'},{id:'finanzas',l:'Finanzas'},{id:'costos',l:'Costos'},{id:'clientes',l:'Clientes'},{id:'reportes',l:'Reportes'}];
const BT=12, MG=30, LML=240, AML=240; // bolos/tanda, maicena g, leche ml, agua ml
const ESTADOS={pedido:{l:'Pedido',cls:'est-pedido'},pendiente:{l:'Pendiente',cls:'est-pendiente'},terminado:{l:'Terminado',cls:'est-terminado'}};
const PAGOS={efectivo:{l:'Efectivo',cls:'pago-efectivo'},transferencia:{l:'Transferencia',cls:'pago-transferencia'}};

// ── Estado por defecto ──────────────────────────────────────────────────────
function defD(){return{
  cfg:{pu:.25,pp:.65},
  esp:{mkg:1.50,ll:.80,al:0},
  stock:Object.fromEntries(SAB.map(s=>[s,{d:0,p:0}])),
  ventas:[],trans:[],clientes:[],cierres:[],caja:null,
  costos:Object.fromEntries(SAB.map(s=>[s,{ing:'',qty:.05,unit:'kg',costo:0}]))
};}

// ── Variables globales ──────────────────────────────────────────────────────
let D=defD(),tab='inicio',selCli=null;
let cmdItems=[{s:SAB[0],q:1}],cmdModo='u',cmdPromos=0,cmdLibre=0;
let cTab='base',cSab=SAB[0],calSab=SAB[0],calBolos=12;
let vFiltro='todos';

// ── Helpers ─────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const hoy=()=>new Date().toISOString().slice(0,10);
const $=id=>document.getElementById(id);
const f$=v=>'$'+(+v||0).toFixed(2);
const f4=v=>'$'+(+v||0).toFixed(4);
const fd=d=>d?d.slice(5):'-';
const fdl=d=>{if(!d)return'-';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;};
const cajaF=()=>!D.caja?null:(typeof D.caja==='string'?D.caja:D.caja.fecha);
const cajaM=()=>!D.caja?0:(typeof D.caja==='string'?0:(D.caja.monto||0));
const cajaOk=()=>cajaF()===hoy();
const sumV=vs=>vs.reduce((a,v)=>a+v.total,0);
const vdDia=d=>D.ventas.filter(v=>v.fecha===d);
const egDia=d=>D.trans.filter(t=>t.fecha===d&&t.tipo==='eg').reduce((a,t)=>a+t.monto,0);
const inDia=d=>D.trans.filter(t=>t.fecha===d&&t.tipo==='in').reduce((a,t)=>a+t.monto,0);

// ── Costos ─────────────────────────────────────────────────────────────────
function cEspT(){const e=D.esp;return(MG/1000)*(e.mkg||0)+(LML/1000)*(e.ll||0)+(AML/1000)*(e.al||0);}
function cSabT(s){const c=D.costos[s];return(c.qty||0)*(c.costo||0);}
function cTanda(s){return cEspT()+cSabT(s);}
function cBolo(s){return cTanda(s)/BT;}

// ── Descripción de venta ────────────────────────────────────────────────────
function vDesc(v){
  if(v.tipo==='comanda')return(v.items||[]).map(i=>`${i.q} ${i.s}`).join(', ');
  if(v.tipo==='unitario')return`${v.cant} bolo${v.cant!==1?'s':''} ×${f$(D.cfg.pu)}`;
  if(v.tipo==='promo')return`${v.promos} promo${v.promos!==1?'s':''} ×${f$(D.cfg.pp)}`;
  return`${v.cant} bolos mayorista`;
}

// ── Total comanda según modo ────────────────────────────────────────────────
function calcTotCmd(bolos,modo,nP,lib){
  if(modo==='u')return+(bolos*D.cfg.pu).toFixed(2);
  if(modo==='opt'){const g=Math.floor(bolos/3),r=bolos%3;return+(g*D.cfg.pp+r*D.cfg.pu).toFixed(2);}
  if(modo==='mix'){const g=Math.min(nP||0,Math.floor(bolos/3)),r=bolos-g*3;return+(g*D.cfg.pp+r*D.cfg.pu).toFixed(2);}
  return+(lib||0).toFixed(2);
}
function prevCmd(bolos,modo,nP,lib){
  const tot=calcTotCmd(bolos,modo,nP,lib);
  if(modo==='u')return`${bolos} × ${f$(D.cfg.pu)} = <strong>${f$(tot)}</strong>`;
  if(modo==='opt'){const g=Math.floor(bolos/3),r=bolos%3;return`${g} promo${g!==1?'s':''} × ${f$(D.cfg.pp)}${r?` + ${r} × ${f$(D.cfg.pu)}`:''} = <strong>${f$(tot)}</strong>`;}
  if(modo==='mix'){const g=Math.min(nP||0,Math.floor(bolos/3)),r=bolos-g*3;return`${g} promo${g!==1?'s':''} × ${f$(D.cfg.pp)}${r?` + ${r} × ${f$(D.cfg.pu)}`:''} = <strong>${f$(tot)}</strong>`;}
  return`Precio libre: <strong>${f$(tot)}</strong>`;
}

// ── Estado / pago badges ────────────────────────────────────────────────────
function eBadge(e){const x=ESTADOS[e||'pedido'];return`<span class="bdg ${x.cls}">${x.l}</span>`;}
function pBadge(p){if(!p)return'';const x=PAGOS[p];return x?`<span class="bdg ${x.cls}" style="margin-left:4px">${x.l}</span>`:'';}

// ── Restaurar stock al eliminar ─────────────────────────────────────────────
function restStock(v){
  if(v.items&&v.items.length){v.items.forEach(it=>{if(it.s&&D.stock[it.s])D.stock[it.s].d+=(+it.q||0);});}
  else if(v.sab&&D.stock[v.sab]){D.stock[v.sab].d+=(+v.cant||0);}
}

// ── Storage ─────────────────────────────────────────────────────────────────
function load(){
  try{
    const r=localStorage.getItem('ab_v4');
    if(r){
      const s=JSON.parse(r);
      D={...defD(),...s};
      D.stock={...defD().stock,...(s.stock||{})};
      D.costos={...defD().costos,...(s.costos||{})};
      if(!D.esp)D.esp=defD().esp;
    }
  }catch(e){}
  ra();
}
function save(){try{localStorage.setItem('ab_v4',JSON.stringify(D));}catch(e){}}

// ── Render ─────────────────────────────────────────────────────────────────
function ra(){rTabs();rScr();const h=$('hsub');if(h)h.textContent=cajaOk()?`Caja abierta: ${fdl(hoy())} (${f$(cajaM())})`:'Sin caja abierta';}
function rTabs(){$('tabs').innerHTML=TABS.map(t=>`<button class="tab${tab===t.id?' on':''}" onclick="go('${t.id}')">${t.l}</button>`).join('');}
function go(id){tab=id;selCli=null;ra();}
function rScr(){const m={inicio:sI,caja:sCaja,stock:sStock,ventas:sVentas,finanzas:sFin,costos:sCostos,clientes:sCli,reportes:sRep};$('scr').innerHTML=(m[tab]||sI)();}

// ══ PANTALLA: INICIO ════════════════════════════════════════════════════════
function sI(){
  const h=hoy(),cv=cajaOk();
  const vh=vdDia(h),iv=sumV(vh),eh=egDia(h),ih=inDia(h),ut=iv+ih-eh;
  const td=SAB.reduce((a,s)=>a+D.stock[s].d,0),ag=SAB.filter(s=>D.stock[s].d===0).length;
  const bj=SAB.filter(s=>D.stock[s].d>0&&D.stock[s].d<4);
  const nPend=D.ventas.filter(v=>(v.estado||'pedido')==='pendiente').length;

  const cajaBan=cv
    ?`<div class="cajav"><div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:12px;font-weight:500;color:#0F6E56">Caja abierta · ${fdl(h)}</div>
        <div style="font-size:11px;color:#1D9E75">Monto inicial: ${f$(cajaM())}</div></div>
        <button class="btn d sm" onclick="openM('cierre')">Cerrar caja</button>
      </div></div>`
    :`<div style="background:#FCEBEB;border:1px solid #F09595;border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:12px;font-weight:500;color:#A32D2D">Sin caja abierta</div>
        <div style="font-size:11px;color:#E24B4A">Abre caja para registrar ventas</div></div>
        <button class="btn p sm" onclick="openM('apertura')">Abrir caja</button>
      </div>`;

  return`${cajaBan}
  <div class="mrow">
    <div class="met"><div class="mlb">Stock total</div><div class="mvl" style="color:#534AB7">${td}</div><div class="msb">${ag} agotados</div></div>
    <div class="met"><div class="mlb">Ventas hoy</div><div class="mvl" style="color:#1D9E75">${vh.length}</div><div class="msb">${f$(iv)}</div></div>
  </div>
  <div class="mrow">
    <div class="met"><div class="mlb">Ingresos hoy</div><div class="mvl" style="color:#1D9E75">${f$(iv+ih)}</div></div>
    <div class="met"><div class="mlb">Egresos hoy</div><div class="mvl" style="color:#D85A30">${f$(eh)}</div></div>
    <div class="met"><div class="mlb">Utilidad</div><div class="mvl" style="color:${ut>=0?'#1D9E75':'#D85A30'}">${f$(ut)}</div></div>
  </div>
  ${nPend>0?`<div style="background:#FCEBEB;border:1px solid #F09595;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:12px;font-weight:500;color:#A32D2D">${nPend} cobro${nPend!==1?'s':''} pendiente${nPend!==1?'s':''}</div>
    <button class="btn sm" style="border-color:#E24B4A;color:#E24B4A;background:transparent" onclick="vFiltro='pendiente';go('ventas')">Ver</button>
  </div>`:''}
  ${bj.length?`<div class="card" style="border-left:3px solid #BA7517">
    <div style="font-size:12px;font-weight:500;color:#633806;margin-bottom:6px">Stock bajo (menos de 4)</div>
    ${bj.map(s=>`<span class="bdg ba" style="margin:2px">${s}: ${D.stock[s].d}</span>`).join('')}
  </div>`:''}
  <div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:10px">Acciones rápidas</div>
    <div class="qg">
      <button class="ab ${cv?'btn p':''}" style="${!cv?'opacity:.4;cursor:default':''}" onclick="${cv?"openM('comanda')":'alert(\"Abre la caja primero\")'}">+ Comanda</button>
      <button class="ab" style="border:0.5px solid #534AB7;color:#534AB7;${!cv?'opacity:.4;cursor:default':''}" onclick="${cv?"openM('simple')":'alert(\"Abre la caja primero\")'}">+ Venta simple</button>
      <button class="ab" style="border:0.5px solid #D85A30;color:#D85A30" onclick="openM('egreso')">+ Egreso</button>
      <button class="ab" style="border:0.5px solid #1D9E75;color:#1D9E75" onclick="openM('prod')">+ Producción</button>
    </div>
  </div>
  <div class="card">
    <div class="rb"><span style="font-size:13px;font-weight:500">Últimas ventas</span><button class="btn op sm" onclick="go('ventas')">Ver todas</button></div>

function sCostCalc(){

    <div class="highlight">Costo total: <strong>${f$(ctot)}</strong> &nbsp; Por bolo: <strong>${f4(ctot/bolos)}</strong></div>

// ══ PANTALLA: REPORTES ════════════════════════════════════════════════════════
function sRep(){
  const tv=sumV(D.ventas),te=D.trans.filter(t=>t.tipo==='eg').reduce((a,t)=>a+t.monto,0);
  const topS=SAB.map((s,i)=>{
    let tot=0;
    D.ventas.forEach(v=>{
      if(v.tipo==='comanda'&&v.items)v.items.forEach(it=>{if(it.s===s)tot+=it.q*D.cfg.pu;});
      else if(v.sab===s)tot+=v.total;
    });
    return{s,v:+tot.toFixed(2),c:COL[i]};
  }).filter(x=>x.v>0).sort((a,b)=>b.v-a.v).slice(0,8);
  const topSt=SAB.map((s,i)=>({s,v:D.stock[s].d,c:COL[i]})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v).slice(0,8);
  const mxS=topS.length?Math.max(...topS.map(x=>x.v)):1,mxSt=topSt.length?Math.max(...topSt.map(x=>x.v)):1;
  const nC=D.ventas.filter(v=>v.tipo==='comanda').length,nU=D.ventas.filter(v=>v.tipo==='unitario').length;
  const nP=D.ventas.filter(v=>v.tipo==='promo').length,nM=D.ventas.filter(v=>v.tipo==='mayorista').length,nT=nC+nU+nP+nM||1;
  const totEf=D.ventas.filter(v=>v.pago==='efectivo'&&v.estado==='terminado').reduce((a,v)=>a+v.total,0);
  const totTr=D.ventas.filter(v=>v.pago==='transferencia'&&v.estado==='terminado').reduce((a,v)=>a+v.total,0);
  return`<div style="font-size:15px;font-weight:500;margin-bottom:12px">Reportes y gráficas</div>
  <div class="mrow">
    <div class="met"><div class="mlb">Total vendido</div><div class="mvl" style="color:#1D9E75">${f$(tv)}</div></div>
    <div class="met"><div class="mlb">Egresos total</div><div class="mvl" style="color:#D85A30">${f$(te)}</div></div>
    <div class="met"><div class="mlb">Utilidad</div><div class="mvl" style="color:${tv-te>=0?'#1D9E75':'#D85A30'}">${f$(tv-te)}</div></div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:8px">Cobros registrados (terminados)</div>
    <div class="mrow" style="margin-bottom:0">
      <div class="met"><div class="mlb">Efectivo</div><div class="mvl" style="color:#1D9E75">${f$(totEf)}</div></div>
      <div class="met"><div class="mlb">Transferencia</div><div class="mvl" style="color:#185FA5">${f$(totTr)}</div></div>
    </div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:8px">Tipo de venta</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${[{l:'Comanda',n:nC,c:'#3B6D11'},{l:'Unitario',n:nU,c:'#534AB7'},{l:'Promo',n:nP,c:'#1D9E75'},{l:'Mayorista',n:nM,c:'#D85A30'}].map(x=>`
      <div style="display:flex;align-items:center;gap:6px;font-size:12px">
        <div style="width:26px;height:26px;border-radius:50%;background:${x.c};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff">${Math.round(x.n/nT*100)}%</div>
        <div><div style="font-weight:500">${x.l}</div><div style="color:var(--tx2)">${x.n}</div></div>
      </div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:8px">Ingresos por sabor</div>
    ${topS.length===0?'<div style="text-align:center;padding:16px;color:var(--tx2);font-size:12px">Sin datos aún</div>'
    :`<div class="bc2">${topS.map(x=>`<div class="bcl"><div class="blv">${f$(x.v)}</div><div class="br2" style="height:${Math.max(6,Math.round(x.v/mxS*100))}px;background:${x.c}"></div><div class="bla">${x.s}</div></div>`).join('')}</div>`}
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:8px">Stock disponible</div>
    ${topSt.length===0?'<div style="text-align:center;padding:16px;color:var(--tx2);font-size:12px">Sin stock registrado</div>'
    :`<div class="bc2">${topSt.map(x=>`<div class="bcl"><div class="blv">${x.v}</div><div class="br2" style="height:${Math.max(6,Math.round(x.v/mxSt*100))}px;background:${x.c}"></div><div class="bla">${x.s}</div></div>`).join('')}</div>`}
  </div>
  ${D.cierres.length>0?`<div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:8px">Cierres de caja</div>
    ${[...D.cierres].reverse().slice(0,7).map(c=>`<div class="li">
      <div><div class="lt">${fdl(c.fecha)}</div><div class="ls">${c.nV} ventas · Inicio: ${f$(c.mi)}</div></div>
      <div style="text-align:right"><div style="font-size:13px;font-weight:500;color:#1D9E75">${f$(c.tv)}</div><div style="font-size:11px;color:${c.ut>=0?'#1D9E75':'#D85A30'}">Saldo: ${f$(c.saldo)}</div></div>
    </div>`).join('')}
  </div>`:''}`;
}

// ══ SISTEMA DE MODALES ════════════════════════════════════════════════════════
let _m=null;
function openM(tipo,ex,ci){
  _m={tipo,ex,ci};
  if(tipo==='comanda'||tipo==='pedido'){cmdItems=[{s:SAB[0],q:1}];cmdModo='u';cmdPromos=0;cmdLibre=0;}
  rM();
}
function closeM(){_m=null;$('mr').innerHTML='';rScr();}
function rM(){
  if(!_m){$('mr').innerHTML='';return;}
  const{tipo,ex,ci}=_m;
  const mapa={
    apertura:  ['Abrir caja', tApertura],
    comanda:   ['Nueva comanda', tComanda],
    simple:    ['Venta simple', tSimple],
    detalle:   ['Detalle de venta', ()=>tDetalle(ex)],
    prod:      ['Registrar producción', tProd],
    ajuste:    [`Ajustar stock: ${ex}`, ()=>tAjuste(ex)],
    egreso:    ['Registrar egreso', ()=>tTrans('eg','egreso')],
    ingreso:   ['Registrar ingreso', ()=>tTrans('in','ingreso')],
    cliente:   ['Nuevo cliente mayorista', tCliente],
    pedido:    ['Nuevo pedido', ()=>tPedido(ci)],
    cierre:    ['Cerrar caja del día', tCierre],
    cfg:       ['Configuración', tCfg]
  };
  const[tit,fn]=mapa[tipo]||['','()=>""'];
  $('mr').innerHTML=`<div class="ov" onclick="if(event.target===this)closeM()">
    <div class="sh">
      <div class="shh"><div class="sht">${tit}</div><button class="xb" onclick="closeM()">×</button></div>
      ${fn()}
    </div>

}

// ── APERTURA DE CAJA ─────────────────────────────────────────────────────────

// ── COMANDA (multi-sabor con tipos de precio) ─────────────────────────────────
function tComanda(){
  const bolos=cmdItems.reduce((a,it)=>a+(+it.q||0),0);
  const gOpt=Math.floor(bolos/3),rOpt=bolos%3;
  const itemsHtml=cmdItems.map((it,i)=>`
    <div class="ci">
      <select onchange="cmdItems[${i}].s=this.value;updCmd()">
        ${SAB.map(s=>`<option${s===it.s?' selected':''}>${s}</option>`).join('')}
      </select>
      <input type="number" min="1" value="${it.q}" oninput="cmdItems[${i}].q=+this.value||1;updCmd()">
      <button class="del" onclick="if(cmdItems.length>1){cmdItems.splice(${i},1);rM();}">×</button>
    </div>`).join('');
  return`<div class="fld"><div class="flb">Cliente / mesa (opcional)</div>
    <input id="c-cli" placeholder="Ej: Emilio, Mesa 3..."></div>
  <div style="font-size:12px;color:var(--tx2);margin-bottom:6px">Productos del pedido</div>
  <div id="c-items">${itemsHtml}</div>
  <button class="btn op fw" style="margin-bottom:10px" onclick="cmdItems.push({s:SAB[0],q:1});rM()">+ Agregar sabor</button>
  <div style="font-size:12px;color:var(--tx2);margin-bottom:6px">Tipo de precio <span class="bdg bp">${bolos} bolo${bolos!==1?'s':''}</span></div>
  <div class="radio-row${cmdModo==='u'?' sel':''}" onclick="cmdModo='u';updCmd()">
    <input type="radio" name="pm"${cmdModo==='u'?' checked':''}><div>
    <div class="radio-label">Todo unitario</div>
    <div class="radio-sub">${bolos} × ${f$(D.cfg.pu)} = ${f$(bolos*D.cfg.pu)}</div></div>
  </div>
  <div class="radio-row${cmdModo==='opt'?' sel':''}" onclick="cmdModo='opt';updCmd()">
    <input type="radio" name="pm"${cmdModo==='opt'?' checked':''}><div>
    <div class="radio-label">Promo optimizada (3 × ${f$(D.cfg.pp)})</div>
    <div class="radio-sub">${gOpt} promo${gOpt!==1?'s':''} × ${f$(D.cfg.pp)}${rOpt>0?` + ${rOpt} × ${f$(D.cfg.pu)}`:''}${gOpt===0?' — mín. 3 bolos':''}</div></div>
  </div>
  <div class="radio-row${cmdModo==='mix'?' sel':''}" onclick="cmdModo='mix';updCmd()">
    <input type="radio" name="pm"${cmdModo==='mix'?' checked':''}><div style="flex:1">
    <div class="radio-label">Mixto — elegir promos</div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
      <input type="number" id="c-np" min="0" max="${gOpt}" value="${Math.min(cmdPromos,gOpt)}" style="width:55px" oninput="cmdPromos=Math.min(+this.value||0,${gOpt});updCmd()">
      <span style="font-size:11px;color:var(--tx2)">grupos de 3</span>
    </div></div>
  </div>
  <div class="radio-row${cmdModo==='lib'?' sel':''}" onclick="cmdModo='lib';updCmd()">
    <input type="radio" name="pm"${cmdModo==='lib'?' checked':''}><div style="flex:1">
    <div class="radio-label">Precio libre</div>
    <div style="margin-top:4px">
      <input type="number" id="c-lib" step=".01" min="0" value="${cmdLibre}" style="width:110px" oninput="cmdLibre=+this.value||0;updCmd()" placeholder="0.00">
    </div></div>
  </div>
  <div class="highlight" id="c-prev">${prevCmd(bolos,cmdModo,cmdPromos,cmdLibre)}</div>
  <div class="fld"><div class="flb">Estado del pedido</div>
    <select id="c-est">
      <option value="pedido">Pedido — recién tomado</option>
      <option value="pendiente">Pendiente — en preparación</option>
    </select>
  </div>
  <div class="fld"><div class="flb">Método de pago (si ya canceló)</div>
    <select id="c-pago">
      <option value="">Sin definir</option>
      <option value="efectivo">Efectivo</option>
      <option value="transferencia">Transferencia</option>
    </select>
  </div>
  <div class="fld"><div class="flb">Fecha</div><input type="date" id="c-fecha" value="${hoy()}"></div>
  <button class="btn p fw" onclick="subComanda()">Registrar comanda</button>`;
}
function updCmd(){
  const bolos=cmdItems.reduce((a,it)=>a+(+it.q||0),0);
  const el=$('c-prev');
  if(el)el.innerHTML=prevCmd(bolos,cmdModo,cmdPromos,cmdLibre);
  // Update visual selection on radio rows
  const rows=document.querySelectorAll('.radio-row');
  const modes=['u','opt','mix','lib'];
  rows.forEach((row,i)=>{if(i<4){row.classList.toggle('sel',modes[i]===cmdModo);}});
  const radios=document.querySelectorAll('.radio-row input[type=radio]');
  const modeIdx=modes.indexOf(cmdModo);
  radios.forEach((r,i)=>r.checked=(i===modeIdx));
}
function subComanda(){
  const cli=($('c-cli')?.value||'').trim();
  const fecha=$('c-fecha')?.value||hoy();
  let estado=$('c-est')?.value||'pedido';
  const pago=$('c-pago')?.value||'';
  if(pago&&estado==='pedido')estado='pendiente';
  const bolos=cmdItems.reduce((a,it)=>a+(+it.q||0),0);
  const tot=calcTotCmd(bolos,cmdModo,cmdPromos,cmdLibre);
  const items=cmdItems.map(it=>({s:it.s,q:+it.q||1}));
  D.ventas.push({id:uid(),tipo:'comanda',cliente:cli,items,cant:bolos,promos:0,total:tot,fecha,sab:items[0].s,estado,pago});
  items.forEach(it=>{D.stock[it.s].d=Math.max(0,(D.stock[it.s].d||0)-it.q);});
  save();closeM();
}

  return`<div class="fld"><div class="flb">Sabor</div>

      <option value="pendiente">Pendiente de cobro</option>

  <div class="fld"><div class="flb">Método de pago</div>

      <option value="">Sin definir</option>
      <option value="efectivo">Efectivo</option>
      <option value="transferencia">Transferencia</option>
    </select>
  </div>
  <div class="fld"><div class="flb">Fecha</div><input type="date" id="s-fecha" value="${hoy()}"></div>
  <button class="btn p fw" onclick="subSimple()">Guardar venta</button>`;
}
function rVE(){
  const t=$('s-tipo')?.value;if(!t)return;
  let h='';
  if(t==='u')h=`<div class="fld"><div class="flb">Cantidad de bolos</div><input type="number" id="s-cant" min="1" value="1" oninput="uVP()"></div>`;
  else if(t==='pr')h=`<div class="fld"><div class="flb">Grupos de 3 bolos</div><input type="number" id="s-promos" min="1" value="1" oninput="uVP()"></div>`;
  else h=`<div class="fld"><div class="flb">Cantidad de bolos</div><input type="number" id="s-cant" min="1" value="10" oninput="uVP()"></div>
    <div class="fld"><div class="flb">Precio total cobrado ($)</div><input type="number" id="s-precio" step=".01" min="0" value="0" oninput="uVP()"></div>
    <div class="fld"><div class="flb">Cliente</div><input id="s-cli" placeholder="Opcional"></div>`;
  $('s-extra').innerHTML=h;uVP();
}
function uVP(){
  const t=$('s-tipo')?.value;let tot=0,det='';
  if(t==='u'){const c=+($('s-cant')?.value||1);tot=+(c*D.cfg.pu).toFixed(2);det=`${c} bolo${c!==1?'s':''} × ${f$(D.cfg.pu)}`;}
  else if(t==='pr'){const p=+($('s-promos')?.value||1);tot=+(p*D.cfg.pp).toFixed(2);det=`${p} promo${p!==1?'s':''} × ${f$(D.cfg.pp)} = ${p*3} bolos`;}
  else{tot=+($('s-precio')?.value||0);det=`${$('s-cant')?.value||0} bolos`;}
  const el=$('s-prev');if(el)el.innerHTML=`${det} → <strong>${f$(tot)}</strong>`;
}
function subSimple(){
  const tipo=$('s-tipo').value,sab=$('s-sab').value,fecha=$('s-fecha')?.value||hoy();
  let estado=$('s-est')?.value||'pedido',pago=$('s-pago')?.value||'';
  if(pago&&estado==='pedido')estado='pendiente';
  let tot,cant,promos=0;
  if(tipo==='u'){cant=+($('s-cant')?.value||1);tot=+(cant*D.cfg.pu).toFixed(2);}
  else if(tipo==='pr'){promos=+($('s-promos')?.value||1);cant=promos*3;tot=+(promos*D.cfg.pp).toFixed(2);}
  else{cant=+($('s-cant')?.value||10);tot=+($('s-precio')?.value||0);}
  const cli=tipo==='may'?($('s-cli')?.value||''):'';
  D.ventas.push({id:uid(),sab,tipo:tipo==='u'?'unitario':tipo==='pr'?'promo':'mayorista',cant,promos,total:tot,fecha,cliente:cli,items:[{s:sab,q:cant}],estado,pago});
  D.stock[sab].d=Math.max(0,(D.stock[sab].d||0)-cant);
  save();closeM();
}

function setEst(id,estado){
  const v=D.ventas.find(x=>x.id===id);if(!v)return;
  v.estado=estado;save();rM();rScr();
}
function setPag(id,pago){
  const v=D.ventas.find(x=>x.id===id);if(!v)return;
  v.pago=pago;
  if(pago&&(v.estado||'pedido')==='pedido')v.estado='pendiente';
  save();rM();rScr();
}
function delV(id){
  const v=D.ventas.find(x=>x.id===id);
  if(v)restStock(v);
  D.ventas=D.ventas.filter(x=>x.id!==id);
  save();closeM();
}

  <div class="fld"><div class="flb">Monto ($)</div>
    <input type="number" id="tr-monto" step=".01" min="0" placeholder="0.00"></div>
  <div class="fld"><div class="flb">Nota (opcional)</div>
    <input id="tr-nota" placeholder="Descripción..."></div>
  <div class="fld"><div class="flb">Fecha</div>
    <input type="date" id="tr-fecha" value="${hoy()}"></div>
  <button class="btn ${tipo==='eg'?'d':'s'} fw" onclick="subTrans('${tipo}')">Guardar ${label}</button>`;
}
function subTrans(tipo){
  D.trans.push({id:uid(),tipo,cat:$('tr-cat').value,monto:+($('tr-monto')?.value||0),nota:$('tr-nota')?.value||'',fecha:$('tr-fecha')?.value||hoy()});
  save();closeM();
}

// ── CLIENTE MAYORISTA ─────────────────────────────────────────────────────────
function tCliente(){
  return`<div class="fld"><div class="flb">Nombre completo</div>
    <input id="cl-nom" placeholder="Ej: María González"></div>
  <div class="fld"><div class="flb">Teléfono</div>
    <input id="cl-tel" placeholder="0999..."></div>
  <div class="fld"><div class="flb">Barrio / Sector</div>
    <input id="cl-bar" placeholder="Ej: Barrio La Paz"></div>
  <button class="btn p fw" onclick="subCliente()">Guardar cliente</button>`;
}
function subCliente(){
  const n=($('cl-nom')?.value||'').trim();
  if(!n)return alert('Ingresa el nombre del cliente');
  D.clientes.push({nombre:n,tel:$('cl-tel')?.value||'',barrio:$('cl-bar')?.value||'',pedidos:[]});
  save();closeM();
}

// ── PEDIDO MAYORISTA ──────────────────────────────────────────────────────────
function tPedido(ci){
  const itemsHtml=cmdItems.map((it,i)=>`
    <div class="ci">
      <select onchange="cmdItems[${i}].s=this.value">
        ${SAB.map(s=>`<option${s===it.s?' selected':''}>${s}</option>`).join('')}
      </select>
      <input type="number" min="1" value="${it.q}" oninput="cmdItems[${i}].q=+this.value||1">
      <button class="del" onclick="cmdItems.splice(${i},1);rM()">×</button>
    </div>`).join('');
  return`${itemsHtml}
  <button class="btn op fw" style="margin-bottom:10px" onclick="cmdItems.push({s:SAB[0],q:1});rM()">+ Agregar sabor</button>
  <div class="fld"><div class="flb">Precio total pactado ($)</div>
    <input type="number" id="pd-precio" step=".01" min="0" placeholder="0.00"></div>
  <div class="fld"><div class="flb">Estado</div>
    <select id="pd-est">
      <option value="pedido">Pedido — acordado</option>
      <option value="pendiente">Pendiente — en preparación</option>
    </select>
  </div>
  <div class="fld"><div class="flb">Nota (opcional)</div>
    <input id="pd-nota" placeholder="Sabores variados, fecha de entrega..."></div>
  <button class="btn p fw" onclick="subPedido(${ci})">Registrar pedido</button>`;
}
function subPedido(ci){
  const tot=+($('pd-precio')?.value||0),nota=$('pd-nota')?.value||'';
  const estado=$('pd-est')?.value||'pedido';
  const cant=cmdItems.reduce((a,it)=>a+(+it.q||0),0);
  const desc=cmdItems.map(it=>`${it.q} ${it.s}`).join(', ');
  D.clientes[ci].pedidos.push({desc,sab:cmdItems[0].s,cant,total:tot,nota,fecha:hoy()});
  D.ventas.push({id:uid(),tipo:'comanda',cliente:D.clientes[ci].nombre,items:cmdItems.map(it=>({s:it.s,q:+it.q})),cant,promos:0,total:tot,fecha:hoy(),sab:cmdItems[0].s,estado,pago:''});
  cmdItems.forEach(it=>{D.stock[it.s].d=Math.max(0,(D.stock[it.s].d||0)-it.q);});
  save();selCli=ci;closeM();
}

// ── CIERRE DE CAJA ────────────────────────────────────────────────────────────
function tCierre(){
  const h=hoy(),vh=vdDia(h),tv=sumV(vh),te=egDia(h),ti=inDia(h);
  const ut=tv+ti-te,mi=cajaM(),saldo=mi+tv+ti-te;
  return`<div class="warn"><strong>Resumen del día — ${fdl(h)}</strong></div>
  <div class="mrow">
    <div class="met"><div class="mlb">Monto inicial</div><div class="mvl" style="font-size:15px;color:#534AB7">${f$(mi)}</div></div>
    <div class="met"><div class="mlb">Ventas del día</div><div class="mvl" style="font-size:15px;color:#1D9E75">${f$(tv)}</div><div class="msb">${vh.length} reg.</div></div>
    <div class="met"><div class="mlb">Egresos</div><div class="mvl" style="font-size:15px;color:#D85A30">${f$(te)}</div></div>
  </div>
  <div class="highlight" style="margin-bottom:12px">Saldo final estimado: <strong>${f$(saldo)}</strong></div>
  <div class="inb">Al confirmar se guarda el resumen en el historial y la caja queda cerrada.</div>
  <button class="btn d fw" onclick="subCierre(${vh.length},${tv},${te},${ti},${ut},${mi},${saldo})">Confirmar cierre de caja</button>
  <button class="btn op fw" onclick="closeM()">Cancelar</button>`;
}
function subCierre(nV,tv,te,ti,ut,mi,saldo){
  D.cierres.push({id:uid(),fecha:hoy(),nV,tv,te,ti,ut,mi,saldo});
  D.caja=null;save();closeM();
}

// ── CONFIGURACIÓN ─────────────────────────────────────────────────────────────
function openCfg(){_m={tipo:'cfg'};rM();}
function tCfg(){
  return`<div class="fld"><div class="flb">Precio unitario por bolo ($)</div>
    <input type="number" id="cf-pu" step=".01" value="${D.cfg.pu}"></div>
  <div class="fld"><div class="flb">Precio promo 3 bolos ($)</div>
    <input type="number" id="cf-pp" step=".01" value="${D.cfg.pp}"></div>
  <div class="inb">Los bolos por tanda son <strong>${BT}</strong> según la receta base (30g maicena, 240ml leche, 240ml agua).</div>
  <button class="btn p fw" onclick="D.cfg={pu:+($('cf-pu').value||.25),pp:+($('cf-pp').value||.65)};save();closeM()">Guardar precios</button>
  <div class="sep"></div>
  <div style="font-size:13px;font-weight:500;margin-bottom:8px">Exportar datos</div>
  <button class="btn op fw" onclick="expV()">Exportar ventas (CSV)</button>
  <button class="btn op fw" style="margin-top:0" onclick="expT()">Exportar transacciones (CSV)</button>
  <button class="btn op fw" style="margin-top:0" onclick="expC()">Exportar cierres de caja (CSV)</button>
  <div class="sep"></div>
  <div class="inb">${D.ventas.length} ventas · ${D.trans.length} transacciones · ${D.clientes.length} clientes · ${D.cierres.length} cierres</div>
  <button class="btn od fw" onclick="if(confirm('¿Borrar TODOS los datos? Esta acción no se puede deshacer.')){D=defD();save();closeM();}">Restablecer todos los datos</button>`;
}

// ── EXPORTS ───────────────────────────────────────────────────────────────────
function expV(){
  const r=[['Fecha','Cliente','Tipo','Detalle','Bolos','Total','Estado','Pago'],
    ...D.ventas.map(v=>[v.fecha,v.cliente||'',v.tipo,vDesc(v),v.cant,v.total,v.estado||'pedido',v.pago||''])];
  dl(r.map(x=>x.join(',')).join('\n'),'ventas.csv');
}
function expT(){
  const r=[['Fecha','Tipo','Categoria','Monto','Nota'],
    ...D.trans.map(t=>[t.fecha,t.tipo==='eg'?'egreso':'ingreso',t.cat,t.monto,t.nota||''])];
  dl(r.map(x=>x.join(',')).join('\n'),'transacciones.csv');
}
function expC(){
  const r=[['Fecha','MontoInicial','Ventas','Egresos','Utilidad','SaldoFinal','NVentas'],
    ...D.cierres.map(c=>[c.fecha,c.mi,c.tv,c.te,c.ut,c.saldo,c.nV])];
  dl(r.map(x=>x.join(',')).join('\n'),'cierres.csv');
}
function dl(csv,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=name;a.click();}

// ── PWA ───────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}

// ── Arranque ──────────────────────────────────────────────────────────────────
load();
</script>
</body>
</html>
